<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#050c18">
  <title>소마 영업 지도 — 마포·강서·양천 PT</title>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      --bg: #050c18;
      --panel: rgba(12, 31, 61, 0.92);
      --panel-2: rgba(18, 40, 71, 0.95);
      --line: rgba(255, 255, 255, 0.1);
      --ink: #fff;
      --ink-2: rgba(255, 255, 255, 0.75);
      --ink-3: rgba(255, 255, 255, 0.5);
      --primary: #2E8CD5;
      --cyan: #5FCDF9;
      --pending: #94a3b8;
      --face: #22c55e;
      --note: #06b6d4;
      --hold: #f59e0b;
      --exclude: #64748b;
      --refuse: #ef4444;
      --header-h: 56px;
      --sidebar-w: 360px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
      height: 100%;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      background: rgba(5, 12, 24, 0.95);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
      z-index: 1000;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand a {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }

    .brand h1 {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      white-space: nowrap;
    }

    .stat strong { font-weight: 700; }

    .main {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 0;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-right: 1px solid var(--line);
      min-height: 0;
    }

    .controls {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-bottom: 1px solid var(--line);
    }

    .search {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.25);
      color: var(--ink);
      font-size: 14px;
      outline: none;
    }

    .search:focus { border-color: var(--primary); }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    select {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.25);
      color: var(--ink);
      font-size: 13px;
      outline: none;
    }

    .status-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tab {
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink-2);
      font-size: 10px;
      cursor: pointer;
      transition: 0.15s;
      flex: 1 1 calc(25% - 4px);
      min-width: 52px;
    }

    .tab.active {
      background: rgba(46, 140, 213, 0.25);
      border-color: var(--primary);
      color: var(--ink);
    }

    .toolbar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.2);
      color: var(--ink-2);
      font-size: 12px;
      cursor: pointer;
    }

    .btn:hover { border-color: var(--primary); color: var(--ink); }
    .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .lead-item {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      margin-bottom: 4px;
      transition: 0.12s;
    }

    .lead-item:hover { background: rgba(255, 255, 255, 0.04); }
    .lead-item.active {
      background: rgba(46, 140, 213, 0.15);
      border-color: rgba(46, 140, 213, 0.4);
    }

    .lead-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid #fff;
      box-shadow: 0 0 8px currentColor;
    }

    .dot.pending { background: var(--pending); }
    .dot.face { background: var(--face); }
    .dot.note { background: var(--note); }
    .dot.hold { background: var(--hold); }
    .dot.exclude { background: var(--exclude); }
    .dot.refuse { background: var(--refuse); }

    .lead-name {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
    }

    .lead-meta {
      font-size: 12px;
      color: var(--ink-3);
      line-height: 1.4;
    }

    .lead-dist {
      color: var(--cyan);
      font-weight: 600;
    }

    .list-sort-hint {
      font-size: 11px;
      color: var(--cyan);
      padding: 0 4px 6px;
      line-height: 1.35;
    }

    .list-sort-hint.muted { color: var(--ink-3); }

    .map-wrap {
      position: relative;
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .custom-marker-wrap {
      background: none !important;
      border: none !important;
    }

    .marker-pin {
      border-radius: 50%;
      border: 3px solid #fff;
      box-sizing: border-box;
      animation: marker-glow 2.4s ease-in-out infinite;
    }

    .marker-pin.active {
      animation: marker-glow-active 1.6s ease-in-out infinite;
      z-index: 1000 !important;
    }

    @keyframes marker-glow {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    @keyframes marker-glow-active {
      0%, 100% { transform: scale(1.15); }
      50% { transform: scale(1.28); }
    }

    .map-actions {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-actions .btn {
      background: var(--panel-2);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .legend {
      position: absolute;
      bottom: 24px;
      left: 12px;
      z-index: 1000;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      backdrop-filter: blur(8px);
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .legend-row:first-child { margin-top: 0; }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--ink-3);
      font-size: 14px;
    }

    .kakao-info-wrap {
      padding: 14px;
      min-width: 240px;
      max-width: 280px;
      font-family: inherit;
    }

    .popup h3 {
      font-size: 15px;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .popup p {
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .hours-line {
      margin: 8px 0 4px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #f0f7ff;
      border: 1px solid #dbeafe;
      font-size: 12px;
      line-height: 1.45;
      color: #334155;
    }

    .hours-line.loading { color: #64748b; font-style: italic; }
    .hours-line .hours-status { font-weight: 600; color: #0f766e; margin-bottom: 4px; }
    .hours-line .hours-status.closed { color: #b45309; }
    .hours-line .hours-row { display: flex; gap: 6px; }
    .hours-line .hours-day { min-width: 1.2em; color: #64748b; }
    .hours-line .hours-note { margin-top: 4px; color: #475569; font-size: 11px; }

    .soma-line {
      margin: 8px 0 4px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #f5f3ff;
      border: 1px solid #ddd6fe;
      font-size: 12px;
      line-height: 1.45;
      color: #334155;
    }
    .soma-line.loading { color: #64748b; font-style: italic; }
    .soma-line .soma-badge { font-weight: 600; margin-bottom: 4px; }
    .soma-line .soma-badge.ok { color: #6d28d9; }
    .soma-line .soma-badge.none { color: #64748b; }
    .soma-line .soma-row { display: flex; justify-content: space-between; gap: 8px; }
    .soma-line .soma-label { color: #64748b; }
    .soma-line .soma-section { margin-top: 6px; padding-top: 6px; border-top: 1px solid #e9e5ff; }
    .soma-line .soma-section-title { font-weight: 600; color: #5b21b6; margin-bottom: 3px; font-size: 11px; }

    .popup-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    .popup-actions button {
      padding: 8px 4px;
      border-radius: 8px;
      border: none;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
    }

    .popup-actions .pending { background: var(--pending); color: #1e293b; }
    .popup-actions .face { background: var(--face); }
    .popup-actions .note { background: var(--note); }
    .popup-actions .hold { background: var(--hold); color: #1e293b; }
    .popup-actions .exclude { background: var(--exclude); }
    .popup-actions .refuse { background: var(--refuse); }

    .popup-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .popup-nav a {
      flex: 1 1 calc(50% - 3px);
      min-width: 80px;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      background: #eef6fc;
      color: var(--primary);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
    }

    .note-input {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 12px;
      resize: vertical;
      min-height: 48px;
      font-family: inherit;
    }

    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 20%, rgba(46, 140, 213, 0.15), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(95, 205, 249, 0.1), transparent 40%),
        var(--bg);
      padding: 24px;
    }

    .login-screen.hidden { display: none; }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }

    .login-card h2 {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 13px;
      color: var(--ink-3);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .login-card input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.25);
      color: var(--ink);
      font-size: 15px;
      outline: none;
      margin-bottom: 12px;
    }

    .login-card input[type="password"]:focus { border-color: var(--primary); }

    .login-error {
      color: #f87171;
      font-size: 12px;
      min-height: 18px;
      margin-bottom: 8px;
    }

    .login-card .btn.primary {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .geocode-status {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--ink-2);
      display: none;
    }

    .geocode-status.show { display: block; }

    .legend.compact { font-size: 11px; padding: 8px 10px; }

    .app.hidden { display: none; }

    @media (max-width: 900px) {
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: 42vh 1fr;
      }

      .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
      .brand h1 { display: none; }
      .stats { overflow-x: auto; flex-wrap: nowrap; max-width: 55vw; }
      .stats .stat { font-size: 10px; padding: 3px 7px; }
    }
  </style>
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h2>소마 영업 지도</h2>
      <p>마포·강서·양천 PT 영업 리스트입니다.<br>접속 비밀번호를 입력하세요.</p>
      <div class="login-error" id="loginError"></div>
      <input type="password" id="loginPassword" placeholder="비밀번호" autocomplete="current-password">
      <button class="btn primary" id="btnLogin">입장</button>
    </div>
  </div>

  <div class="app hidden" id="app">
    <header>
      <div class="brand">
        <a href="https://soma.ai.kr">SoMa</a>
        <h1>마포·강서·양천 PT 영업 지도</h1>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <div class="main">
      <aside class="sidebar" id="sidebar">
        <div class="controls">
          <input type="search" class="search" id="search" placeholder="업체명, 주소, 동 검색…" autocomplete="off">
          <div class="filters">
            <select id="filterGu"><option value="">전체 구</option></select>
            <select id="filterDong"><option value="">전체 동</option></select>
          </div>
          <div class="status-tabs" id="statusTabs">
            <button class="tab active" data-status="">전체</button>
            <button class="tab" data-status="pending">미방문</button>
            <button class="tab" data-status="face">대면</button>
            <button class="tab" data-status="note">쪽지</button>
            <button class="tab" data-status="hold">보류</button>
            <button class="tab" data-status="exclude">제외</button>
            <button class="tab" data-status="refuse">거절</button>
          </div>
          <div class="toolbar">
            <button class="btn" id="btnExport">백업</button>
            <button class="btn" id="btnImport">복원</button>
            <input type="file" id="importFile" accept=".json" hidden>
            <button class="btn" id="btnReset">초기화</button>
          </div>
        </div>
        <div class="list-sort-hint muted" id="listSortHint">위치 허용 시 가까운 업체부터 표시됩니다</div>
        <div class="list" id="list"></div>
      </aside>

      <div class="map-wrap">
        <div id="geocodeStatus" class="geocode-status"></div>
        <div id="map"></div>
        <div class="map-actions">
          <button class="btn" id="btnLocate" title="내 위치">📍 내 위치</button>
          <button class="btn" id="btnFit" title="전체 보기">🗺️ 전체</button>
        </div>
        <div class="legend compact">
          <div class="legend-row"><span class="dot pending"></span> 미방문</div>
          <div class="legend-row"><span class="dot face"></span> 대면 완료</div>
          <div class="legend-row"><span class="dot note"></span> 쪽지 완료</div>
          <div class="legend-row"><span class="dot hold"></span> 보류</div>
          <div class="legend-row"><span class="dot exclude"></span> 제외</div>
          <div class="legend-row"><span class="dot refuse"></span> 거절</div>
        </div>
      </div>
    </div>
  </div>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const STORAGE_KEY = 'soma-sales-map-v1';
    const COORDS_KEY = 'soma-sales-coords-v1';
    const GEOCODE_SKIP_KEY = 'soma-sales-geocode-skip-v1';
    const SYNC_AT_KEY = 'soma-sales-sync-at';
    const AUTH_FLAG = 'soma_maps_client_auth';
    const STATUS_KEYS = ['pending', 'face', 'note', 'hold', 'exclude', 'refuse'];
    const STATUS_COLORS = {
      pending: '#94a3b8',
      face: '#22c55e',
      note: '#06b6d4',
      hold: '#f59e0b',
      exclude: '#64748b',
      refuse: '#ef4444'
    };
    const STATUS_LABELS = {
      pending: '미방문',
      face: '대면 완료',
      note: '쪽지 완료',
      hold: '보류',
      exclude: '제외',
      refuse: '거절'
    };

    let leads = [];
    let coordOverrides = loadCoordOverrides();
    let state = loadState();
    let map, markers = {}, activeId = null;
    let myLocationMarker = null;
    let myLocation = null;
    let locationWatchId = null;
    let markerLayer = null;
    let geocodeSkipped = loadGeocodeSkipped();
    let serverSyncAvailable = false;
    let syncTimer = null;
    let hoursCache = {};
    let insightsCache = {};
    let filterStatus = '', filterGu = '', filterDong = '', query = '';

    function normalizeStatus(st) {
      if (st === 'visited') return 'face';
      if (st === 'skip') return 'exclude';
      return STATUS_KEYS.includes(st) ? st : 'pending';
    }

    function migrateLegacyStatuses() {
      let changed = false;
      Object.keys(state).forEach(id => {
        const entry = state[id];
        if (!entry || !entry.status) return;
        const next = normalizeStatus(entry.status);
        if (next !== entry.status) {
          entry.status = next;
          changed = true;
        }
      });
      if (changed) saveState();
    }

    function loadGeocodeSkipped() {
      try {
        return new Set(JSON.parse(localStorage.getItem(GEOCODE_SKIP_KEY) || '[]'));
      } catch {
        return new Set();
      }
    }

    function saveGeocodeSkipped() {
      scheduleSyncPush();
    }

    function persistLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      localStorage.setItem(COORDS_KEY, JSON.stringify(coordOverrides));
      localStorage.setItem(GEOCODE_SKIP_KEY, JSON.stringify([...geocodeSkipped]));
    }

    function scheduleSyncPush() {
      persistLocal();
      if (!serverSyncAvailable) return;
      clearTimeout(syncTimer);
      syncTimer = setTimeout(pushSyncToServer, 500);
    }

    async function loadSyncFromServer() {
      try {
        const res = await apiFetch('/api/maps-sync');
        if (!res.ok) return;
        const data = await res.json();
        serverSyncAvailable = data.syncAvailable !== false;
        if (!serverSyncAvailable) return;

        const serverHas = Object.keys(data.visitState || {}).length > 0;
        const localHas = Object.keys(state).length > 0;
        const localAt = localStorage.getItem(SYNC_AT_KEY);
        const serverAt = data.updatedAt;
        const serverIsNewer = serverAt && (!localAt || new Date(serverAt) >= new Date(localAt));

        if (data.hoursCache && typeof data.hoursCache === 'object') {
          hoursCache = { ...hoursCache, ...data.hoursCache };
        }

        if (serverHas && serverIsNewer) {
          state = data.visitState || {};
          coordOverrides = data.coordOverrides || {};
          geocodeSkipped = new Set(data.geocodeSkipped || []);
          persistLocal();
          if (serverAt) localStorage.setItem(SYNC_AT_KEY, serverAt);
        } else if (localHas) {
          await pushSyncToServer();
        }
      } catch { /* offline — local only */ }
    }

    async function pushSyncToServer() {
      if (!serverSyncAvailable) return;
      try {
        const res = await apiFetch('/api/maps-sync', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            visitState: state,
            routePlan: {},
            coordOverrides,
            geocodeSkipped: [...geocodeSkipped],
          }),
        });
        if (res.ok) {
          const data = await res.json();
          if (data.updatedAt) localStorage.setItem(SYNC_AT_KEY, data.updatedAt);
        }
      } catch { /* ignore */ }
    }

    function loadCoordOverrides() {
      try {
        return JSON.parse(localStorage.getItem(COORDS_KEY) || '{}');
      } catch {
        return {};
      }
    }

    function saveCoordOverrides() {
      scheduleSyncPush();
    }

    function isGeocodable(lead) {
      const addr = (lead.address || '').trim();
      return addr && addr !== '정보 없음';
    }

    function leadCoords(lead) {
      const o = coordOverrides[lead.id];
      if (o) return { lat: o.lat, lng: o.lng };
      return { lat: lead.lat, lng: lead.lng };
    }

    async function apiFetch(url, options = {}) {
      return fetch(url, { credentials: 'include', ...options });
    }

    async function isAuthed() {
      try {
        const res = await apiFetch('/api/leads', { method: 'HEAD' });
        if (res.ok) {
          sessionStorage.setItem(AUTH_FLAG, '1');
          return true;
        }
      } catch { /* ignore */ }
      sessionStorage.removeItem(AUTH_FLAG);
      return false;

        const res = await apiFetch('/api/maps-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),

    async function refineCoordsViaApi() {
      const imprecise = leads.filter(l =>
        !l.precise && !coordOverrides[l.id] && !geocodeSkipped.has(l.id) && isGeocodable(l)
      );
      if (!imprecise.length) return;

      const statusEl = document.getElementById('geocodeStatus');
      let done = 0;
      let failed = 0;

      for (const lead of imprecise) {
        statusEl.textContent = `주소 좌표 변환 중… ${done + failed + 1}/${imprecise.length}`;
        statusEl.classList.add('show');
        try {
          const q = new URLSearchParams({
            address: lead.address,
            keyword: `${lead.name} ${lead.address}`,
          });
          const res = await apiFetch(`/api/geocode?${q}`);
          if (res.ok) {
            const data = await res.json();
            coordOverrides[lead.id] = { lat: data.lat, lng: data.lng, source: data.source };
            done += 1;
          } else {
            geocodeSkipped.add(lead.id);
            failed += 1;
          }
        } catch {
          geocodeSkipped.add(lead.id);
          failed += 1;
        }
        await new Promise(r => setTimeout(r, 120));
      }

      saveGeocodeSkipped();
      saveCoordOverrides();

      if (done > 0) {
        statusEl.textContent = failed
          ? `좌표 변환 완료 (${done}건, 실패 ${failed}건)`
          : `좌표 변환 완료 (${done}건)`;
        setTimeout(() => statusEl.classList.remove('show'), 2500);
      } else {
        statusEl.classList.remove('show');
      }
      refreshUI();
    }

    function renderHoursHtml(data) {
      if (!data) return '영업시간 정보 없음';

      if (data.status || data.statusDetail) {
        const closed = /휴무|종료|닫/.test(data.status || '');
        parts.push(`<div class="hours-status${closed ? ' closed' : ''}">${escapeHtml(data.status)}${data.statusDetail ? ' · ' + escapeHtml(data.statusDetail) : ''}</div>`);
      }
      if (data.schedule && data.schedule.length) {
        parts.push(data.schedule.map(row =>
          `<div class="hours-row"><span class="hours-day">${escapeHtml(row.day)}</span><span>${escapeHtml(row.hours)}</span></div>`
        ).join(''));
      }
      if (data.note) {
        parts.push(`<div class="hours-note">${escapeHtml(data.note)}</div>`);
      }
      return parts.length ? parts.join('') : '영업시간 정보 없음';

    async function fetchHoursForLead(lead) {
      const cached = hoursCache[lead.id];
      if (cached) {
        if (cached.ok === false) {
          setHoursInPopup(lead.id, cached.message || '영업시간을 찾지 못했습니다.', true);
        } else {
          setHoursInPopup(lead.id, renderHoursHtml(cached), false);
        }
        return;
      }
      setHoursInPopup(lead.id, '영업시간 불러오는 중…', true);
      try {
        const q = new URLSearchParams({
          leadId: lead.id,
          name: lead.name,
          address: lead.address || '',
        });
        const res = await apiFetch(`/api/place-hours?${q}`);
        const data = await res.json();
        if (!res.ok) {
          setHoursInPopup(lead.id, data.message || '영업시간을 찾지 못했습니다.', true);
          return;
        }
        hoursCache[lead.id] = data;
        setHoursInPopup(lead.id, renderHoursHtml(data), false);
      } catch {
        setHoursInPopup(lead.id, '영업시간 조회 실패', true);
      }

    function formatDateKo(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '-';
      return `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;
    }

    function planLabel(planType) {
      const map = { trial: '체험', monthly: '월간', yearly: '연간', none: '없음' };
      return map[planType] || planType;
    }

    function renderInsightsHtml(data) {
      if (!data) return '소마 데이터 없음';
      if (!data.registered) {
        return '<div class="soma-badge none">소마 미등록 센터</div>';
      }
      const b = data.bookingActivity || {};
      const p = data.plans || {};
      const parts = [];
      parts.push(`<div class="soma-badge ok">소마 등록 · ${escapeHtml(data.match.name)}</div>`);
      parts.push(`<div class="soma-row"><span class="soma-label">등록일</span><span>${formatDateKo(data.match.registeredAt)}</span></div>`);

      parts.push('<div class="soma-section"><div class="soma-section-title">수업 예약 (누적)</div>');
      parts.push(`<div class="soma-row"><span class="soma-label">전체</span><span>${b.total || 0}건</span></div>`);
      parts.push(`<div class="soma-row"><span class="soma-label">완료/확정</span><span>${b.completed || 0}건</span></div>`);
      if (b.firstAt) {
        parts.push(`<div class="soma-row"><span class="soma-label">기간</span><span>${formatDateKo(b.firstAt)} ~ ${formatDateKo(b.lastAt)}</span></div>`);
      }
      parts.push('</div>');

      const staffActive = (p.staff || []).filter(s => s.status === 'active').reduce((sum, s) => sum + s.count, 0);
      const trainers = p.people?.trainers || {};
      const members = p.people?.members || {};
      parts.push('<div class="soma-section"><div class="soma-section-title">인원 · 플랜</div>');
      parts.push(`<div class="soma-row"><span class="soma-label">트레이너</span><span>활성 ${trainers.active || 0} · 유료 ${staffActive}</span></div>`);
      parts.push(`<div class="soma-row"><span class="soma-label">회원</span><span>활성 ${members.active || 0} · 초대 ${members.invited || 0}</span></div>`);
      const passActive = (p.memberPasses || []).filter(x => x.status === 'active').reduce((sum, x) => sum + x.count, 0);
      parts.push(`<div class="soma-row"><span class="soma-label">수강권</span><span>활성 ${passActive}건</span></div>`);
      const staffSummary = (p.staff || [])
        .filter(s => s.status === 'active' && s.planType !== 'none')
        .map(s => `${planLabel(s.planType)} ${s.count}`)
        .join(', ');
      if (staffSummary) {
        parts.push(`<div class="soma-row"><span class="soma-label">앱 구독</span><span>${escapeHtml(staffSummary)}</span></div>`);
      }
      parts.push('</div>');
      return parts.join('');

    function setInsightsInPopup(leadId, html, isError) {
      const el = document.querySelector(`.soma-line[data-soma-id="${leadId}"]`);
      if (!el) return;
      el.classList.remove('loading');
      if (isError) {
        el.innerHTML = escapeHtml(html);
        el.style.color = '#64748b';
      } else {
        el.innerHTML = html;
      }
    }

    async function fetchInsightsForLead(lead) {
      if (insightsCache[lead.id]) {
        setInsightsInPopup(lead.id, renderInsightsHtml(insightsCache[lead.id]), false);
        return;
      }
      setInsightsInPopup(lead.id, '소마 데이터 불러오는 중…', true);
      try {
        const q = new URLSearchParams({
          name: lead.name,
          address: lead.address || '',
          phone: lead.phone || '',
        });
        const res = await apiFetch(`/api/center-insights?${q}`);
        const data = await res.json();
        if (!res.ok) {
          const msg = data.message || data.error || '소마 데이터를 불러오지 못했습니다.';
          setInsightsInPopup(lead.id, msg === 'not_configured' ? '소마 연동 미설정' : msg, true);

    function openInfoForLead(lead) {
      activeId = lead.id;
      renderList(getDisplayLeads());
      if (markers[lead.id]) markers[lead.id].openPopup();
      setTimeout(() => {
        bindPopupEvents();
        fetchHoursForLead(lead);
        fetchInsightsForLead(lead);
      }, 30);
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function filteredLeads() {
      return leads.filter(l => {
        if (filterGu && l.gu !== filterGu) return false;
        if (filterDong && l.dong !== filterDong) return false;
        if (filterStatus && getStatus(l.id) !== filterStatus) return false;
        if (query) {
          const q = query.toLowerCase();
          const blob = `${l.name} ${l.address} ${l.dong} ${l.gu} ${l.phone}`.toLowerCase();
          if (!blob.includes(q)) return false;
        }
        return true;
      });
    }

    function distanceKm(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const toRad = d => (d * Math.PI) / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function leadDistanceKm(lead) {
      if (!myLocation) return null;
      const c = leadCoords(lead);
      return distanceKm(myLocation.lat, myLocation.lng, c.lat, c.lng);
    }

    function formatDistanceKm(km) {
      if (km == null || Number.isNaN(km)) return '';
      if (km < 1) return `${Math.round(km * 1000)}m`;
      return `${km.toFixed(1)}km`;
    }

    function getDisplayLeads() {
      const items = filteredLeads();
      if (!myLocation) return items;
      return [...items].sort((a, b) => leadDistanceKm(a) - leadDistanceKm(b));
    }

    function updateListSortHint() {
      const el = document.getElementById('listSortHint');
      if (!el) return;
      if (myLocation) {
        el.textContent = '내 위치 기준 가까운순';
        el.classList.remove('muted');
      } else {
        el.textContent = '위치 허용 시 가까운 업체부터 표시됩니다';
        el.classList.add('muted');
      }
    }

    function applyMyLocation(lat, lng, panMap) {
      myLocation = { lat, lng };
      updateListSortHint();
      if (!map) {
        refreshUI();
        return;
      }
      if (myLocationMarker) map.removeLayer(myLocationMarker);
      myLocationMarker = L.circleMarker([lat, lng], {
        radius: 8,
        color: '#2E8CD5',
        fillColor: '#5FCDF9',
        fillOpacity: 0.85,
        weight: 2,
      }).addTo(map).bindPopup('내 위치');
      if (panMap) map.setView([lat, lng], Math.max(map.getZoom(), 15));
      refreshUI();
    }

    function startLocationTracking() {
      if (!navigator.geolocation) return;
      const opts = { enableHighAccuracy: true, maximumAge: 30000, timeout: 20000 };
      navigator.geolocation.getCurrentPosition(
        pos => applyMyLocation(pos.coords.latitude, pos.coords.longitude, false),
        () => {},
        opts
      );
      if (locationWatchId != null) navigator.geolocation.clearWatch(locationWatchId);
      locationWatchId = navigator.geolocation.watchPosition(
        pos => applyMyLocation(pos.coords.latitude, pos.coords.longitude, false),
        () => {},
        opts
      );
    }

    function renderStats() {
      const counts = Object.fromEntries(STATUS_KEYS.map(k => [k, 0]));
      leads.forEach(l => {
        const st = getStatus(l.id);
        counts[st] = (counts[st] || 0) + 1;
      });
      document.getElementById('stats').innerHTML = `
        <span class="stat">전체 <strong>${leads.length}</strong></span>
        <span class="stat">미방문 <strong>${counts.pending}</strong></span>
        <span class="stat">대면 <strong>${counts.face}</strong></span>
        <span class="stat">쪽지 <strong>${counts.note}</strong></span>
        <span class="stat">보류 <strong>${counts.hold}</strong></span>
        <span class="stat">제외 <strong>${counts.exclude}</strong></span>
        <span class="stat">거절 <strong>${counts.refuse}</strong></span>`;
    }

    function renderList(items) {
      const el = document.getElementById('list');
      if (!items.length) {
        el.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
        return;
      }
      el.innerHTML = items.map(l => {
        const st = getStatus(l.id);
        const dist = leadDistanceKm(l);
        const distHtml = dist != null
          ? `<span class="lead-dist">${formatDistanceKm(dist)}</span> · `
          : '';
        return `
          <div class="lead-item${l.id === activeId ? ' active' : ''}" data-id="${l.id}">
            <div class="lead-top">
              <span class="dot ${st}"></span>
              <span class="lead-name">${escapeHtml(l.name)}</span>
            </div>
            <div class="lead-meta">${distHtml}${escapeHtml(l.gu)} ${escapeHtml(l.dong)} · ${STATUS_LABELS[st]}</div>
          </div>`;
      }).join('');
    }

    function makeLeafletIcon(status, isActive) {
      const color = STATUS_COLORS[status] || STATUS_COLORS.pending;
      const size = isActive ? 26 : 20;
      return L.divIcon({
        className: 'custom-marker-wrap',
        html: `<div class="marker-pin${isActive ? ' active' : ''}" style="width:${size}px;height:${size}px;background:${color};box-shadow:0 0 0 3px #fff,0 0 16px ${color};"></div>`,
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2]
      });
    }

    function createMarker(lead, isActive) {
      const c = leadCoords(lead);
      const st = getStatus(lead.id);
      const m = L.marker([c.lat, c.lng], { icon: makeLeafletIcon(st, isActive) });
      m.bindPopup(popupContent(lead), { maxWidth: 280 });
      m.on('popupopen', () => {
        activeId = lead.id;
        renderList(getDisplayLeads());
        bindPopupEvents();
        fetchHoursForLead(lead);
        fetchInsightsForLead(lead);
      });
      return m;
    }

    function renderMarkers(items) {
      if (markerLayer) {
        map.removeLayer(markerLayer);
        markerLayer = null;
      }
      markers = {};
      markerLayer = L.layerGroup();
      items.forEach(l => {
        const m = createMarker(l, l.id === activeId);
        markers[l.id] = m;
        markerLayer.addLayer(m);
      });
      markerLayer.addTo(map);
    }

    function bindPopupEvents() {
      document.querySelectorAll('.popup-actions button').forEach(btn => {
        btn.onclick = () => {
          const id = btn.dataset.id;
          const noteEl = document.querySelector(`.note-input[data-id="${id}"]`);
          setLeadStatus(id, btn.dataset.status, noteEl ? noteEl.value : '');
        };
      });
      document.querySelectorAll('.note-input').forEach(ta => {
        ta.onchange = () => setLeadStatus(ta.dataset.id, getStatus(ta.dataset.id), ta.value);
        ta.onblur = ta.onchange;
      });
    }

    function refreshUI(focusId) {
      renderStats();
      updateListSortHint();
      const items = getDisplayLeads();
      renderList(items);
      renderMarkers(items);
      if (focusId && markers[focusId]) {
        const lead = leads.find(l => l.id === focusId);
        if (lead) {
          const c = leadCoords(lead);
          map.setView([c.lat, c.lng], Math.max(map.getZoom(), 16));
          openInfoForLead(lead);
        }
      }
    }

    function populateFilters() {
      const gus = [...new Set(leads.map(l => l.gu))].sort();
      const guSel = document.getElementById('filterGu');
      gus.forEach(g => {
        const o = document.createElement('option');
        o.value = g; o.textContent = g;
        guSel.appendChild(o);
      });
      updateDongFilter();
    }

    function updateDongFilter() {
      const dongSel = document.getElementById('filterDong');
      const prev = dongSel.value;
      dongSel.innerHTML = '<option value="">전체 동</option>';
      const dongs = [...new Set(
        leads.filter(l => !filterGu || l.gu === filterGu).map(l => l.dong)
      )].sort();
      dongs.forEach(d => {
        const o = document.createElement('option');
        o.value = d; o.textContent = d;
        dongSel.appendChild(o);
      });
      if (dongs.includes(prev)) dongSel.value = prev;
      else { dongSel.value = ''; filterDong = ''; }
    }

    function initMap() {
      const container = document.getElementById('map');
      map = L.map(container).setView([37.548, 126.88], 12);
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap',
        maxZoom: 19
      }).addTo(map);
    }

    function fitAllMarkers() {
      const items = getDisplayLeads();
      if (!items.length) return;
      const bounds = L.latLngBounds(items.map(l => {
        const c = leadCoords(l);
        return [c.lat, c.lng];
      }));
      map.fitBounds(bounds.pad(0.08));
    }

    async function init() {
      await waitForLayout();
      const leadsPromise = apiFetch('/api/leads');
      initMap();
      const res = await leadsPromise;
      if (!res.ok) throw new Error('데이터를 불러올 수 없습니다.');
      const data = await res.json();
      leads = data.leads || [];
      leads.filter(l => !l.precise && !isGeocodable(l)).forEach(l => geocodeSkipped.add(l.id));
      await loadSyncFromServer();
      migrateLegacyStatuses();
      populateFilters();
      refreshUI();
      startLocationTracking();

      refineCoordsViaApi();

      document.getElementById('search').addEventListener('input', e => {
        query = e.target.value.trim();
        if (map && map.closePopup) map.closePopup();
        refreshUI();
      });

      document.getElementById('filterGu').addEventListener('change', e => {
        filterGu = e.target.value;
        updateDongFilter();
        if (map && map.closePopup) map.closePopup();
        refreshUI();
      });

      document.getElementById('filterDong').addEventListener('change', e => {
        filterDong = e.target.value;
        if (map && map.closePopup) map.closePopup();
        refreshUI();
      });

      document.getElementById('statusTabs').addEventListener('click', e => {
        const tab = e.target.closest('.tab');
        if (!tab) return;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        filterStatus = tab.dataset.status;
        if (map && map.closePopup) map.closePopup();
        refreshUI();
      });

      document.getElementById('list').addEventListener('click', e => {
        const item = e.target.closest('.lead-item');
        if (!item) return;
        activeId = item.dataset.id;
        refreshUI(activeId);
      });

      document.getElementById('btnFit').addEventListener('click', fitAllMarkers);

      document.getElementById('btnLocate').addEventListener('click', () => {
        if (!navigator.geolocation) return alert('위치 정보를 사용할 수 없습니다.');
        navigator.geolocation.getCurrentPosition(
          pos => applyMyLocation(pos.coords.latitude, pos.coords.longitude, true),
          () => alert('위치 권한이 필요합니다.'),
          { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
        );
      });

      document.getElementById('btnExport').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify({ exportedAt: new Date().toISOString(), state }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `soma-sales-backup-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
      });

      document.getElementById('btnImport').addEventListener('click', () => {
        document.getElementById('importFile').click();
      });

      document.getElementById('importFile').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            state = { ...state, ...(data.state || data) };
            saveState();
            refreshUI();
            alert('복원되었습니다.');
          } catch {
            alert('파일 형식이 올바르지 않습니다.');
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      });

      document.getElementById('btnReset').addEventListener('click', () => {
        if (!confirm('모든 영업 기록(방문 상태·메모)을 초기화할까요?')) return;
        state = {};
        saveState();
        refreshUI();
      });
    }

    async function boot() {
      const authed = await isAuthed();
      if (authed) {
        showApp();
        try {
          await init();
        } catch (err) {
          console.error(err);
          alert('지도를 불러오지 못했습니다.\n\n' + (err.message || err));
        }
        return;
      }

      const loginPassword = document.getElementById('loginPassword');
      const loginError = document.getElementById('loginError');

      document.getElementById('btnLogin').addEventListener('click', async () => {
        loginError.textContent = '';
        try {
          await login(loginPassword.value);
          showApp();
          await init();
        } catch (err) {
          if (err.message && err.message.includes('비밀')) {
            loginError.textContent = err.message;
          } else {
            console.error(err);
            alert('지도를 불러오지 못했습니다.\n\n' + (err.message || err));
          }
        }
      });

      loginPassword.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btnLogin').click();
      });
    }

    boot();
  </script>
</body>
</html>
