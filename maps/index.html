<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#050c18">
  <title>소마 영업 지도 — 마포·강서·양천 PT</title>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      --bg: #050c18;
      --panel: rgba(12, 31, 61, 0.92);
      --panel-2: rgba(18, 40, 71, 0.95);
      --line: rgba(255, 255, 255, 0.1);
      --ink: #fff;
      --ink-2: rgba(255, 255, 255, 0.75);
      --ink-3: rgba(255, 255, 255, 0.5);
      --primary: #2E8CD5;
      --cyan: #5FCDF9;
      --pending: #94a3b8;
      --visited: #22c55e;
      --hold: #f59e0b;
      --skip: #ef4444;
      --header-h: 56px;
      --sidebar-w: 360px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
      height: 100%;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      background: rgba(5, 12, 24, 0.95);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
      z-index: 1000;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand a {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }

    .brand h1 {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      white-space: nowrap;
    }

    .stat strong { font-weight: 700; }

    .main {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 0;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-right: 1px solid var(--line);
      min-height: 0;
    }

    .controls {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-bottom: 1px solid var(--line);
    }

    .search {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.25);
      color: var(--ink);
      font-size: 14px;
      outline: none;
    }

    .search:focus { border-color: var(--primary); }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    select {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.25);
      color: var(--ink);
      font-size: 13px;
      outline: none;
    }

    .status-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }

    .tab {
      padding: 7px 4px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink-2);
      font-size: 11px;
      cursor: pointer;
      transition: 0.15s;
    }

    .tab.active {
      background: rgba(46, 140, 213, 0.25);
      border-color: var(--primary);
      color: var(--ink);
    }

    .toolbar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.2);
      color: var(--ink-2);
      font-size: 12px;
      cursor: pointer;
    }

    .btn:hover { border-color: var(--primary); color: var(--ink); }
    .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .lead-item {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      margin-bottom: 4px;
      transition: 0.12s;
    }

    .lead-item:hover { background: rgba(255, 255, 255, 0.04); }
    .lead-item.active {
      background: rgba(46, 140, 213, 0.15);
      border-color: rgba(46, 140, 213, 0.4);
    }

    .lead-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid #fff;
      box-shadow: 0 0 8px currentColor;
    }

    .dot.pending { background: var(--pending); }
    .dot.visited { background: var(--visited); }
    .dot.hold { background: var(--hold); }
    .dot.skip { background: var(--skip); }

    .lead-name {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
    }

    .lead-meta {
      font-size: 12px;
      color: var(--ink-3);
      line-height: 1.4;
    }

    .map-wrap {
      position: relative;
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .custom-marker-wrap {
      background: none !important;
      border: none !important;
    }

    .marker-pin {
      border-radius: 50%;
      border: 3px solid #fff;
      box-sizing: border-box;
      animation: marker-glow 2.4s ease-in-out infinite;
    }

    .marker-pin.active {
      animation: marker-glow-active 1.6s ease-in-out infinite;
      z-index: 1000 !important;
    }

    @keyframes marker-glow {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    @keyframes marker-glow-active {
      0%, 100% { transform: scale(1.15); }
      50% { transform: scale(1.28); }
    }

    .map-actions {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-actions .btn {
      background: var(--panel-2);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .legend {
      position: absolute;
      bottom: 24px;
      left: 12px;
      z-index: 1000;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      backdrop-filter: blur(8px);
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .legend-row:first-child { margin-top: 0; }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--ink-3);
      font-size: 14px;
    }

    .kakao-info-wrap {
      padding: 14px;
      min-width: 240px;
      max-width: 280px;
      font-family: inherit;
    }

    .popup h3 {
      font-size: 15px;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .popup p {
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .popup-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 10px;
    }

    .popup-actions button {
      padding: 8px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
    }

    .popup-actions .pending { background: var(--pending); color: #1e293b; }
    .popup-actions .visited { background: var(--visited); }
    .popup-actions .hold { background: var(--hold); }
    .popup-actions .skip { background: var(--skip); }

    .popup-nav {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .popup-nav a {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      background: #eef6fc;
      color: var(--primary);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
    }

    .note-input {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 12px;
      resize: vertical;
      min-height: 48px;
      font-family: inherit;
    }

    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 20%, rgba(46, 140, 213, 0.15), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(95, 205, 249, 0.1), transparent 40%),
        var(--bg);
      padding: 24px;
    }

    .login-screen.hidden { display: none; }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }

    .login-card h2 {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 13px;
      color: var(--ink-3);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .login-card input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.25);
      color: var(--ink);
      font-size: 15px;
      outline: none;
      margin-bottom: 12px;
    }

    .login-card input[type="password"]:focus { border-color: var(--primary); }

    .login-error {
      color: #f87171;
      font-size: 12px;
      min-height: 18px;
      margin-bottom: 8px;
    }

    .login-card .btn.primary {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .geocode-status {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--ink-2);
      display: none;
    }

    .geocode-status.show { display: block; }

    .app.hidden { display: none; }

    @media (max-width: 900px) {
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: 42vh 1fr;
      }

      .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
      .brand h1 { display: none; }
      .stats .stat:nth-child(n+3) { display: none; }
    }
  </style>
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h2>소마 영업 지도</h2>
      <p>마포·강서·양천 PT 영업 리스트입니다.<br>접속 비밀번호를 입력하세요.</p>
      <div class="login-error" id="loginError"></div>
      <input type="password" id="loginPassword" placeholder="비밀번호" autocomplete="current-password">
      <button class="btn primary" id="btnLogin">입장</button>
    </div>
  </div>

  <div class="app hidden" id="app">
    <header>
      <div class="brand">
        <a href="https://soma.ai.kr">SoMa</a>
        <h1>마포·강서·양천 PT 영업 지도</h1>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <div class="main">
      <aside class="sidebar">
        <div class="controls">
          <input type="search" class="search" id="search" placeholder="업체명, 주소, 동 검색…" autocomplete="off">
          <div class="filters">
            <select id="filterGu"><option value="">전체 구</option></select>
            <select id="filterDong"><option value="">전체 동</option></select>
          </div>
          <div class="status-tabs" id="statusTabs">
            <button class="tab active" data-status="">전체</button>
            <button class="tab" data-status="pending">미방문</button>
            <button class="tab" data-status="visited">완료</button>
            <button class="tab" data-status="hold">보류</button>
          </div>
          <div class="toolbar">
            <button class="btn" id="btnExport">백업</button>
            <button class="btn" id="btnImport">복원</button>
            <input type="file" id="importFile" accept=".json" hidden>
            <button class="btn" id="btnReset">초기화</button>
          </div>
        </div>
        <div class="list" id="list"></div>
      </aside>

      <div class="map-wrap">
        <div id="geocodeStatus" class="geocode-status"></div>
        <div id="map"></div>
        <div class="map-actions">
          <button class="btn" id="btnLocate" title="내 위치">📍 내 위치</button>
          <button class="btn" id="btnFit" title="전체 보기">🗺️ 전체</button>
        </div>
        <div class="legend">
          <div class="legend-row"><span class="dot pending"></span> 미방문</div>
          <div class="legend-row"><span class="dot visited"></span> 영업 완료</div>
          <div class="legend-row"><span class="dot hold"></span> 보류/재방문</div>
          <div class="legend-row"><span class="dot skip"></span> 제외</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'soma-sales-map-v1';
    const COORDS_KEY = 'soma-sales-coords-v1';
    const AUTH_FLAG = 'soma_maps_client_auth';
    const STATUS_COLORS = {
      pending: '#94a3b8',
      visited: '#22c55e',
      hold: '#f59e0b',
      skip: '#ef4444'
    };
    const STATUS_LABELS = {
      pending: '미방문',
      visited: '영업 완료',
      hold: '보류',
      skip: '제외'
    };

    let leads = [];
    let coordOverrides = loadCoordOverrides();
    let state = loadState();
    let map, infoWindow, markers = {}, activeId = null;
    let myLocationMarker = null;
    let filterStatus = '', filterGu = '', filterDong = '', query = '';

    function loadCoordOverrides() {
      try {
        return JSON.parse(localStorage.getItem(COORDS_KEY) || '{}');
      } catch {
        return {};
      }
    }

    function saveCoordOverrides() {
      localStorage.setItem(COORDS_KEY, JSON.stringify(coordOverrides));
    }

    function leadCoords(lead) {
      const o = coordOverrides[lead.id];
      if (o) return { lat: o.lat, lng: o.lng };
      return { lat: lead.lat, lng: lead.lng };
    }

    function toLatLng(lead) {
      const c = leadCoords(lead);
      return new kakao.maps.LatLng(c.lat, c.lng);
    }

    async function apiFetch(url, options = {}) {
      return fetch(url, { credentials: 'include', ...options });
    }

    async function isAuthed() {
      try {
        const res = await apiFetch('/api/leads', { method: 'HEAD' });
        if (res.ok) {
          sessionStorage.setItem(AUTH_FLAG, '1');
          return true;
        }
      } catch { /* ignore */ }
      sessionStorage.removeItem(AUTH_FLAG);
      return false;
    }

    async function login(password) {
      try {
        const res = await apiFetch('/api/maps-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (res.ok) {
          sessionStorage.setItem(AUTH_FLAG, '1');
          return;
        }
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || '로그인 실패');
      } catch (err) {
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
          if (password === 'asdf1234') {
            sessionStorage.setItem(AUTH_FLAG, '1');
            return;
          }
        }
        throw err;
      }
    }

    function showApp() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
    }

    function waitForLayout() {
      return new Promise(resolve => {
        requestAnimationFrame(() => requestAnimationFrame(resolve));
      });
    }

    function relayoutMap() {
      if (map && map.relayout) {
        map.relayout();
      }
    }

    function loadKakaoSdk(key) {
      return new Promise((resolve, reject) => {
        if (window.kakao && window.kakao.maps) {
          kakao.maps.load(() => {
            if (!kakao.maps.Map) reject(new Error('카카오맵 API 사용 불가'));
            else resolve();
          });
          return;
        }
        const script = document.createElement('script');
        script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${encodeURIComponent(key)}&autoload=false`;
        script.onload = () => {
          kakao.maps.load(() => {
            if (!kakao.maps.Map) reject(new Error('카카오맵 API 사용 불가'));
            else resolve();
          });
        };
        script.onerror = () => reject(new Error('카카오맵 SDK 스크립트 로드 실패'));
        document.head.appendChild(script);
      });
    }

    async function getKakaoKey() {
      try {
        const res = await apiFetch('/api/maps-config');
        if (res.ok) {
          const data = await res.json();
          if (data.kakaoJsKey) return data.kakaoJsKey;
        }
      } catch { /* ignore */ }
      return '5596f90a80c8ed0b8877c09370d5f29b';
    }

    async function refineCoordsViaApi() {
      const imprecise = leads.filter(l => !l.precise && !coordOverrides[l.id]);
      if (!imprecise.length) return;

      const statusEl = document.getElementById('geocodeStatus');
      statusEl.classList.add('show');
      let done = 0;
      let failed = 0;

      for (const lead of imprecise) {
        statusEl.textContent = `주소 좌표 변환 중… ${done + 1}/${imprecise.length}`;
        try {
          const q = new URLSearchParams({
            address: lead.address,
            keyword: `${lead.name} ${lead.address}`,
          });
          const res = await apiFetch(`/api/geocode?${q}`);
          if (res.ok) {
            const data = await res.json();
            coordOverrides[lead.id] = { lat: data.lat, lng: data.lng, source: data.source };
            done += 1;
          } else {
            failed += 1;
          }
        } catch {
          failed += 1;
        }
        await new Promise(r => setTimeout(r, 120));
      }

      saveCoordOverrides();
      statusEl.textContent = failed
        ? `좌표 변환 완료 (${done}건, 실패 ${failed}건)`
        : `좌표 변환 완료 (${done}건)`;
      setTimeout(() => statusEl.classList.remove('show'), 2500);
      refreshUI();
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch {
        return {};
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getStatus(id) {
      return (state[id] && state[id].status) || 'pending';
    }

    function getNote(id) {
      return (state[id] && state[id].note) || '';
    }

    function setLeadStatus(id, status, note) {
      state[id] = {
        status,
        note: note !== undefined ? note : getNote(id),
        updatedAt: new Date().toISOString()
      };
      saveState();
      if (infoWindow) infoWindow.close();
      refreshUI(id);
    }

    function markerImageUrl(color, isActive) {
      const size = isActive ? 26 : 20;
      const pad = isActive ? 28 : 20;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${pad * 2}" height="${pad * 2}">
        <circle cx="${pad}" cy="${pad}" r="${size / 2 + 4}" fill="${color}" opacity="0.25"/>
        <circle cx="${pad}" cy="${pad}" r="${size / 2 + 2}" fill="${color}" opacity="0.45"/>
        <circle cx="${pad}" cy="${pad}" r="${size / 2}" fill="${color}" stroke="#fff" stroke-width="3"/>
      </svg>`;
      return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    }

    function createMarker(lead, isActive) {
      const st = getStatus(lead.id);
      const color = STATUS_COLORS[st] || STATUS_COLORS.pending;
      const size = isActive ? 26 : 20;
      const imageSize = new kakao.maps.Size(size + 40, size + 40);
      const markerImage = new kakao.maps.MarkerImage(
        markerImageUrl(color, isActive),
        imageSize,
        { offset: new kakao.maps.Point((size + 40) / 2, (size + 40) / 2) }
      );
      const marker = new kakao.maps.Marker({
        position: toLatLng(lead),
        image: markerImage,
        zIndex: isActive ? 10 : 1
      });
      marker.leadId = lead.id;
      kakao.maps.event.addListener(marker, 'click', () => openInfoForLead(lead));
      return marker;
    }

    function popupContent(lead) {
      const note = getNote(lead.id);
      const phoneHtml = lead.phone
        ? `<p><a href="tel:${lead.phone}">${lead.phone}</a></p>`
        : '<p>전화번호 없음</p>';
      const navQuery = encodeURIComponent(lead.address || lead.name);
      return `<div class="kakao-info-wrap popup">
          <h3>${escapeHtml(lead.name)}</h3>
          <p>${escapeHtml(lead.gu)} ${escapeHtml(lead.dong)}</p>
          <p>${escapeHtml(lead.address)}</p>
          ${phoneHtml}
          <textarea class="note-input" data-id="${lead.id}" placeholder="메모 (자동 저장)">${escapeHtml(note)}</textarea>
          <div class="popup-actions">
            <button class="pending" data-id="${lead.id}" data-status="pending">미방문</button>
            <button class="visited" data-id="${lead.id}" data-status="visited">완료</button>
            <button class="hold" data-id="${lead.id}" data-status="hold">보류</button>
            <button class="skip" data-id="${lead.id}" data-status="skip">제외</button>
          </div>
          <div class="popup-nav">
            <a href="https://map.kakao.com/?q=${navQuery}" target="_blank" rel="noopener">카카오 지도</a>
            <a href="https://map.naver.com/v5/search/${navQuery}" target="_blank" rel="noopener">네이버 지도</a>
          </div>
        </div>`;
    }

    function openInfoForLead(lead) {
      activeId = lead.id;
      renderList(filteredLeads());
      if (!infoWindow) {
        infoWindow = new kakao.maps.InfoWindow({ removable: true, zIndex: 20 });
      }
      infoWindow.setContent(popupContent(lead));
      infoWindow.open(map, markers[lead.id]);
      setTimeout(bindPopupEvents, 30);
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function filteredLeads() {
      return leads.filter(l => {
        if (filterGu && l.gu !== filterGu) return false;
        if (filterDong && l.dong !== filterDong) return false;
        if (filterStatus && getStatus(l.id) !== filterStatus) return false;
        if (query) {
          const q = query.toLowerCase();
          const blob = `${l.name} ${l.address} ${l.dong} ${l.gu} ${l.phone}`.toLowerCase();
          if (!blob.includes(q)) return false;
        }
        return true;
      });
    }

    function renderStats() {
      const counts = { pending: 0, visited: 0, hold: 0, skip: 0 };
      leads.forEach(l => counts[getStatus(l.id)]++);
      document.getElementById('stats').innerHTML = `
        <span class="stat">전체 <strong>${leads.length}</strong></span>
        <span class="stat">미방문 <strong>${counts.pending}</strong></span>
        <span class="stat">완료 <strong>${counts.visited}</strong></span>
        <span class="stat">보류 <strong>${counts.hold}</strong></span>
        <span class="stat">제외 <strong>${counts.skip}</strong></span>`;
    }

    function renderList(items) {
      const el = document.getElementById('list');
      if (!items.length) {
        el.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
        return;
      }
      el.innerHTML = items.map(l => {
        const st = getStatus(l.id);
        return `
          <div class="lead-item${l.id === activeId ? ' active' : ''}" data-id="${l.id}">
            <div class="lead-top">
              <span class="dot ${st}"></span>
              <span class="lead-name">${escapeHtml(l.name)}</span>
            </div>
            <div class="lead-meta">${escapeHtml(l.gu)} ${escapeHtml(l.dong)} · ${STATUS_LABELS[st]}</div>
          </div>`;
      }).join('');
    }

    function renderMarkers(items) {
      Object.values(markers).forEach(m => m.setMap(null));
      markers = {};
      items.forEach(l => {
        const m = createMarker(l, l.id === activeId);
        m.setMap(map);
        markers[l.id] = m;
      });
    }

    function bindPopupEvents() {
      document.querySelectorAll('.popup-actions button').forEach(btn => {
        btn.onclick = () => {
          const id = btn.dataset.id;
          const noteEl = document.querySelector(`.note-input[data-id="${id}"]`);
          setLeadStatus(id, btn.dataset.status, noteEl ? noteEl.value : '');
        };
      });
      document.querySelectorAll('.note-input').forEach(ta => {
        ta.onchange = () => setLeadStatus(ta.dataset.id, getStatus(ta.dataset.id), ta.value);
        ta.onblur = ta.onchange;
      });
    }

    function refreshUI(focusId) {
      renderStats();
      const items = filteredLeads();
      renderList(items);
      renderMarkers(items);
      if (focusId && markers[focusId]) {
        const lead = leads.find(l => l.id === focusId);
        if (lead) {
          map.setCenter(toLatLng(lead));
          map.setLevel(Math.min(map.getLevel(), 5));
          openInfoForLead(lead);
        }
      }
    }

    function populateFilters() {
      const gus = [...new Set(leads.map(l => l.gu))].sort();
      const guSel = document.getElementById('filterGu');
      gus.forEach(g => {
        const o = document.createElement('option');
        o.value = g; o.textContent = g;
        guSel.appendChild(o);
      });
      updateDongFilter();
    }

    function updateDongFilter() {
      const dongSel = document.getElementById('filterDong');
      const prev = dongSel.value;
      dongSel.innerHTML = '<option value="">전체 동</option>';
      const dongs = [...new Set(
        leads.filter(l => !filterGu || l.gu === filterGu).map(l => l.dong)
      )].sort();
      dongs.forEach(d => {
        const o = document.createElement('option');
        o.value = d; o.textContent = d;
        dongSel.appendChild(o);
      });
      if (dongs.includes(prev)) dongSel.value = prev;
      else { dongSel.value = ''; filterDong = ''; }
    }

    function initMap() {
      const container = document.getElementById('map');
      if (!container.offsetWidth || !container.offsetHeight) {
        throw new Error('지도 영역 크기 0 — 새로고침 후 다시 시도해주세요.');
      }
      map = new kakao.maps.Map(container, {
        center: new kakao.maps.LatLng(37.548, 126.88),
        level: 8
      });
      map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHTBOTTOM);
      relayoutMap();
    }

    function fitAllMarkers() {
      const items = filteredLeads();
      if (!items.length) return;
      const bounds = new kakao.maps.LatLngBounds();
      items.forEach(l => bounds.extend(toLatLng(l)));
      map.setBounds(bounds, 40, 40, 40, 40);
    }

    async function init() {
      const key = await getKakaoKey();
      await loadKakaoSdk(key);
      await waitForLayout();
      await new Promise(r => setTimeout(r, 150));
      initMap();

      const res = await apiFetch('/api/leads');
      if (!res.ok) throw new Error('데이터를 불러올 수 없습니다.');
      const data = await res.json();
      leads = data.leads || [];
      populateFilters();
      refreshUI();
      setTimeout(relayoutMap, 200);
      refineCoordsViaApi();

      document.getElementById('search').addEventListener('input', e => {
        query = e.target.value.trim();
        if (infoWindow) infoWindow.close();
        refreshUI();
      });

      document.getElementById('filterGu').addEventListener('change', e => {
        filterGu = e.target.value;
        updateDongFilter();
        if (infoWindow) infoWindow.close();
        refreshUI();
      });

      document.getElementById('filterDong').addEventListener('change', e => {
        filterDong = e.target.value;
        if (infoWindow) infoWindow.close();
        refreshUI();
      });

      document.getElementById('statusTabs').addEventListener('click', e => {
        const tab = e.target.closest('.tab');
        if (!tab) return;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        filterStatus = tab.dataset.status;
        if (infoWindow) infoWindow.close();
        refreshUI();
      });

      document.getElementById('list').addEventListener('click', e => {
        const item = e.target.closest('.lead-item');
        if (!item) return;
        activeId = item.dataset.id;
        refreshUI(activeId);
      });

      document.getElementById('btnFit').addEventListener('click', fitAllMarkers);

      document.getElementById('btnLocate').addEventListener('click', () => {
        if (!navigator.geolocation) return alert('위치 정보를 사용할 수 없습니다.');
        navigator.geolocation.getCurrentPosition(pos => {
          const loc = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
          map.setCenter(loc);
          map.setLevel(4);
          if (myLocationMarker) myLocationMarker.setMap(null);
          myLocationMarker = new kakao.maps.Marker({
            position: loc,
            map,
            image: new kakao.maps.MarkerImage(
              markerImageUrl('#5FCDF9', true),
              new kakao.maps.Size(66, 66),
              { offset: new kakao.maps.Point(33, 33) }
            ),
            zIndex: 15
          });
        }, () => alert('위치 권한이 필요합니다.'));
      });

      document.getElementById('btnExport').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify({ exportedAt: new Date().toISOString(), state }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `soma-sales-backup-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
      });

      document.getElementById('btnImport').addEventListener('click', () => {
        document.getElementById('importFile').click();
      });

      document.getElementById('importFile').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            state = { ...state, ...(data.state || data) };
            saveState();
            refreshUI();
            alert('복원되었습니다.');
          } catch {
            alert('파일 형식이 올바르지 않습니다.');
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      });

      document.getElementById('btnReset').addEventListener('click', () => {
        if (!confirm('모든 영업 기록(방문 상태·메모)을 초기화할까요?')) return;
        state = {};
        saveState();
        refreshUI();
      });
    }

    async function boot() {
      const authed = await isAuthed();
      if (authed) {
        showApp();
        try {
          await init();
        } catch (err) {
          console.error(err);
          alert(
            '지도를 불러오지 못했습니다.\n\n' +
            (err.message || err) + '\n\n' +
            '확인 사항:\n' +
            '1. 카카오 Developers → 플랫폼 키 → JavaScript 키 사용\n' +
            '2. 앱 → 일반 → Web에 https://soma.ai.kr 등록\n' +
            '3. 제품 설정 → 카카오맵 ON'
          );
        }
        return;
      }

      const loginPassword = document.getElementById('loginPassword');
      const loginError = document.getElementById('loginError');

      document.getElementById('btnLogin').addEventListener('click', async () => {
        loginError.textContent = '';
        try {
          await login(loginPassword.value);
          showApp();
          await init();
        } catch (err) {
          if (err.message && err.message.includes('비밀')) {
            loginError.textContent = err.message;
          } else {
            console.error(err);
            alert(
              '지도를 불러오지 못했습니다.\n\n' +
              (err.message || err) + '\n\n' +
              '확인: 제품 설정 → 카카오맵 ON'
            );
          }
        }
      });

      loginPassword.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btnLogin').click();
      });
    }

    boot();
  </script>
</body>
</html>
