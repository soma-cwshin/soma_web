<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#050c18">
  <title>소마 영업 지도 — 마포·강서·양천·금천·영등포·구로 PT</title>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      --bg: #050c18;
      --panel: rgba(12, 31, 61, 0.92);
      --panel-2: rgba(18, 40, 71, 0.95);
      --line: rgba(255, 255, 255, 0.1);
      --ink: #fff;
      --ink-2: rgba(255, 255, 255, 0.75);
      --ink-3: rgba(255, 255, 255, 0.5);
      --primary: #2E8CD5;
      --cyan: #5FCDF9;
      --pending: #94a3b8;
      --face: #22c55e;
      --note: #06b6d4;
      --hold: #f59e0b;
      --exclude: #64748b;
      --refuse: #ef4444;
      --header-h: auto;
      --sidebar-w: 360px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
      height: 100%;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 16px;
      min-height: 56px;
      background: rgba(5, 12, 24, 0.95);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
      z-index: 1000;
    }

    .header-stats {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      min-width: 0;
      flex: 1;
    }

    .stats-day-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stats-day-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--cyan);
      white-space: nowrap;
    }

    .stats.stats-day .stat {
      border-color: rgba(95, 205, 249, 0.35);
      background: rgba(46, 140, 213, 0.12);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand a {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }

    .brand h1 {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      white-space: nowrap;
    }

    .stat strong { font-weight: 700; }

    .main {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 0;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-right: 1px solid var(--line);
      min-height: 0;
    }

    .controls {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-bottom: 1px solid var(--line);
    }

    .search {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.25);
      color: var(--ink);
      font-size: 14px;
      outline: none;
    }

    .search:focus { border-color: var(--primary); }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    select {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.25);
      color: var(--ink);
      font-size: 13px;
      outline: none;
    }

    .status-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tab {
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink-2);
      font-size: 10px;
      cursor: pointer;
      transition: 0.15s;
      flex: 1 1 calc(25% - 4px);
      min-width: 52px;
    }

    .tab.active {
      background: rgba(46, 140, 213, 0.25);
      border-color: var(--primary);
      color: var(--ink);
    }

    .toolbar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.2);
      color: var(--ink-2);
      font-size: 12px;
      cursor: pointer;
    }

    .btn:hover { border-color: var(--primary); color: var(--ink); }
    .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .lead-item {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      margin-bottom: 4px;
      transition: 0.12s;
    }

    .lead-item:hover { background: rgba(255, 255, 255, 0.04); }
    .lead-item.active {
      background: rgba(46, 140, 213, 0.15);
      border-color: rgba(46, 140, 213, 0.4);
    }

    .lead-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid #fff;
      box-shadow: 0 0 8px currentColor;
    }

    .dot.pending { background: var(--pending); }
    .dot.face { background: var(--face); }
    .dot.note { background: var(--note); }
    .dot.hold { background: var(--hold); }
    .dot.exclude { background: var(--exclude); }
    .dot.refuse { background: var(--refuse); }

    .lead-name {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
    }

    .lead-meta {
      font-size: 12px;
      color: var(--ink-3);
      line-height: 1.4;
    }

    .lead-dist {
      color: var(--cyan);
      font-weight: 600;
    }

    .list-sort-hint {
      font-size: 11px;
      color: var(--cyan);
      padding: 0 4px 6px;
      line-height: 1.35;
    }

    .list-sort-hint.muted { color: var(--ink-3); }

    .map-wrap {
      position: relative;
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .custom-marker-wrap {
      background: none !important;
      border: none !important;
    }

    .marker-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      pointer-events: none;
    }

    .marker-pin {
      border-radius: 50%;
      border: 3px solid #fff;
      box-sizing: border-box;
      animation: marker-glow 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    .marker-pin.active {
      animation: marker-glow-active 1.6s ease-in-out infinite;
      z-index: 1000 !important;
    }

    .list-more-hint {
      padding: 10px 12px;
      font-size: 11px;
      color: var(--ink-3);
      text-align: center;
      border-top: 1px solid var(--line);
    }

    .marker-side {
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: flex-start;
      pointer-events: none;
    }

    .open-pill {
      font-size: 9px;
      font-weight: 800;
      line-height: 1;
      padding: 2px 5px;
      border-radius: 4px;
      letter-spacing: 0.02em;
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }

    .open-pill.on {
      background: #22c55e;
      color: #fff;
    }

    .open-pill.off {
      background: #64748b;
      color: #fff;
    }

    .open-pill.unk {
      background: rgba(15, 23, 42, 0.75);
      color: #cbd5e1;
    }

    .soma-sub-tag {
      font-size: 9px;
      font-weight: 800;
      line-height: 1;
      padding: 2px 5px;
      border-radius: 4px;
      background: #7c3aed;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
      letter-spacing: 0.04em;
    }

    .sub-pills {
      display: flex;
      flex-direction: column;
      gap: 2px;
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      padding: 3px 5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    .sub-pill {
      font-size: 9px;
      line-height: 1.2;
      color: #e2e8f0;
      white-space: nowrap;
    }

    .sub-pill.delta.up { color: #4ade80; }
    .sub-pill.delta.down { color: #f87171; }
    .sub-pill.delta.flat { color: #94a3b8; }
    .sub-pill.exp { color: #c4b5fd; }

    @keyframes marker-glow {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    @keyframes marker-glow-active {
      0%, 100% { transform: scale(1.15); }
      50% { transform: scale(1.28); }
    }

    .map-actions {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-actions .btn {
      background: var(--panel-2);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .legend {
      position: absolute;
      bottom: 24px;
      left: 12px;
      z-index: 1000;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      backdrop-filter: blur(8px);
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .legend-row:first-child { margin-top: 0; }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--ink-3);
      font-size: 14px;
    }

    .kakao-info-wrap {
      padding: 14px;
      min-width: 240px;
      max-width: 280px;
      font-family: inherit;
    }

    .popup h3 {
      font-size: 15px;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .popup p {
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .hours-line {
      margin: 8px 0 4px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #f0f7ff;
      border: 1px solid #dbeafe;
      font-size: 12px;
      line-height: 1.45;
      color: #334155;
    }

    .hours-line.loading { color: #64748b; font-style: italic; }
    .hours-line .hours-status { font-weight: 600; color: #0f766e; margin-bottom: 4px; }
    .hours-line .hours-status.closed { color: #b45309; }
    .hours-line .hours-row { display: flex; gap: 6px; }
    .hours-line .hours-day { min-width: 1.2em; color: #64748b; }
    .hours-line .hours-note { margin-top: 4px; color: #475569; font-size: 11px; }

    .soma-line {
      margin: 8px 0 4px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #f5f3ff;
      border: 1px solid #ddd6fe;
      font-size: 12px;
      line-height: 1.45;
      color: #334155;
    }
    .soma-line.loading { color: #64748b; font-style: italic; }
    .soma-line .soma-badge { font-weight: 600; margin-bottom: 4px; }
    .soma-line .soma-badge.ok { color: #6d28d9; }
    .soma-line .soma-badge.none { color: #64748b; }
    .soma-line .soma-row { display: flex; justify-content: space-between; gap: 8px; }
    .soma-line .soma-label { color: #64748b; }
    .soma-line .soma-section { margin-top: 6px; padding-top: 6px; border-top: 1px solid #e9e5ff; }
    .soma-line .soma-section-title { font-weight: 600; color: #5b21b6; margin-bottom: 3px; font-size: 11px; }

    .popup-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    .popup-actions button {
      padding: 8px 4px;
      border-radius: 8px;
      border: none;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
    }

    .popup-actions .pending { background: var(--pending); color: #1e293b; }
    .popup-actions .face { background: var(--face); }
    .popup-actions .note { background: var(--note); }
    .popup-actions .hold { background: var(--hold); color: #1e293b; }
    .popup-actions .exclude { background: var(--exclude); }
    .popup-actions .refuse { background: var(--refuse); }

    .popup-status-badges {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      margin: 0 0 8px;
    }

    .popup-status-badges .open-pill {
      font-size: 11px;
      padding: 3px 8px;
    }

    .popup-status-badges .soma-sub-tag {
      font-size: 10px;
      padding: 3px 8px;
    }

    .popup-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .popup-nav a {
      flex: 1 1 calc(50% - 3px);
      min-width: 80px;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      background: #eef6fc;
      color: var(--primary);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
    }

    .note-input {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 12px;
      resize: vertical;
      min-height: 48px;
      font-family: inherit;
    }

    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 20%, rgba(46, 140, 213, 0.15), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(95, 205, 249, 0.1), transparent 40%),
        var(--bg);
      padding: 24px;
    }

    .login-screen.hidden { display: none; }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }

    .login-card h2 {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 13px;
      color: var(--ink-3);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .login-card input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.25);
      color: var(--ink);
      font-size: 15px;
      outline: none;
      margin-bottom: 12px;
    }

    .login-card input[type="password"]:focus { border-color: var(--primary); }

    .login-error {
      color: #f87171;
      font-size: 12px;
      min-height: 18px;
      margin-bottom: 8px;
    }

    .login-card .btn.primary {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .geocode-status {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--ink-2);
      display: none;
    }

    .geocode-status.show { display: block; }

    .legend.compact { font-size: 11px; padding: 8px 10px; }

    .app.hidden { display: none; }

    .mobile-detail {
      display: none;
    }

    .mobile-detail-backdrop {
      display: none;
    }

    @media (max-width: 900px) {
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: 38vh 1fr;
      }

      .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
      .brand h1 { display: none; }
      .header-stats { max-width: 58vw; }
      .stats { overflow-x: auto; flex-wrap: nowrap; max-width: 100%; }
      .stats .stat { font-size: 10px; padding: 3px 7px; }
      .stats-day-label { font-size: 10px; }

      .map-wrap .leaflet-popup-pane {
        display: none;
      }

      .marker-pin,
      .marker-pin.active {
        animation: none !important;
      }

      .mobile-sub-icon .open-pill {
        font-size: 8px;
        padding: 1px 4px;
      }

      .mobile-sub-icon .soma-sub-tag {
        font-size: 8px;
        padding: 1px 4px;
      }

      .mobile-sub-icon .marker-pin {
        box-shadow: 0 0 0 2px #fff !important;
      }

      .legend.compact {
        bottom: 12px;
        left: 8px;
        max-width: calc(100% - 16px);
        font-size: 10px;
      }

      .map-actions {
        top: 8px;
        right: 8px;
      }

      .mobile-detail-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        z-index: 1500;
        background: rgba(0, 0, 0, 0.45);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s ease;
      }

      .mobile-detail-backdrop.open {
        opacity: 1;
        pointer-events: auto;
      }

      .mobile-detail {
        display: flex;
        flex-direction: column;
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 1600;
        max-height: min(72vh, 520px);
        background: #fff;
        color: #1e293b;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.35);
        transform: translateY(105%);
        transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
        padding-bottom: env(safe-area-inset-bottom, 0);
      }

      .mobile-detail.open {
        transform: translateY(0);
      }

      .mobile-detail-handle {
        flex-shrink: 0;
        padding: 10px 16px 6px;
        cursor: grab;
        touch-action: none;
      }

      .mobile-detail-handle::before {
        content: '';
        display: block;
        width: 40px;
        height: 4px;
        margin: 0 auto 8px;
        border-radius: 999px;
        background: #cbd5e1;
      }

      .mobile-detail-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 0 16px 10px;
        border-bottom: 1px solid #e2e8f0;
      }

      .mobile-detail-header h3 {
        font-size: 17px;
        font-weight: 700;
        line-height: 1.35;
        color: #0f172a;
      }

      .mobile-detail-close {
        flex-shrink: 0;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: 50%;
        background: #f1f5f9;
        color: #475569;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
      }

      .mobile-detail-body {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        padding: 12px 16px 16px;
      }

      .mobile-detail-body .kakao-info-wrap {
        padding: 0;
        min-width: 0;
        max-width: none;
      }

      .mobile-detail-body .popup h3 {
        display: none;
      }

      .mobile-detail-body .popup-actions button {
        padding: 10px 6px;
        font-size: 12px;
      }

      .mobile-detail-body .note-input {
        min-height: 56px;
        font-size: 14px;
      }

      .mobile-detail-body .popup-nav a {
        padding: 10px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h2>소마 영업 지도</h2>
      <p>마포·강서·양천·금천·영등포·구로 PT 영업 리스트입니다.<br>접속 비밀번호를 입력하세요.</p>
      <div class="login-error" id="loginError"></div>
      <input type="password" id="loginPassword" placeholder="비밀번호" autocomplete="current-password">
      <button class="btn primary" id="btnLogin">입장</button>
    </div>
  </div>

  <div class="app hidden" id="app">
    <header>
      <div class="brand">
        <a href="https://soma.ai.kr">SoMa</a>
        <h1>마포·강서·양천·금천·영등포·구로 PT 영업 지도</h1>
      </div>
      <div class="header-stats">
        <div class="stats" id="stats"></div>
        <div class="stats-day-wrap">
          <span class="stats-day-label" id="statsDayLabel"></span>
          <div class="stats stats-day" id="statsDay"></div>
        </div>
      </div>
    </header>

    <div class="main">

      </aside>

      <div class="map-wrap">
        <div id="geocodeStatus" class="geocode-status"></div>
        <div id="map"></div>
        <div class="map-actions">
          <button class="btn" id="btnLocate" title="내 위치">📍 내 위치</button>
          <button class="btn" id="btnFit" title="전체 보기">🗺️ 전체</button>
        </div>
        <div class="legend compact">
          <div class="legend-row"><span class="dot pending"></span> 미방문</div>
          <div class="legend-row"><span class="dot face"></span> 대면 완료</div>
          <div class="legend-row"><span class="dot note"></span> 쪽지 완료</div>
          <div class="legend-row"><span class="dot hold"></span> 보류</div>
          <div class="legend-row"><span class="dot exclude"></span> 제외</div>
          <div class="legend-row"><span class="dot refuse"></span> 거절</div>
        </div>

  <div class="mobile-detail-backdrop" id="mobileDetailBackdrop" aria-hidden="true"></div>
  <div class="mobile-detail" id="mobileDetail" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="mobile-detail-handle" id="mobileDetailHandle"></div>
    <div class="mobile-detail-header">
      <h3 id="mobileDetailTitle"></h3>
      <button type="button" class="mobile-detail-close" id="mobileDetailClose" aria-label="닫기">×</button>
    </div>
    <div class="mobile-detail-body" id="mobileDetailBody"></div>
  </div>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
  <script>
    const STORAGE_KEY = 'soma-sales-map-v1';
    const COORDS_KEY = 'soma-sales-coords-v1';
    const GEOCODE_SKIP_KEY = 'soma-sales-geocode-skip-v1';
    const SYNC_AT_KEY = 'soma-sales-sync-at';
    const AUTH_FLAG = 'soma_maps_client_auth';
    const STATUS_KEYS = ['pending', 'face', 'note', 'hold', 'exclude', 'refuse'];
    const STATUS_COLORS = {
      pending: '#94a3b8',
      face: '#22c55e',
      note: '#06b6d4',
      hold: '#f59e0b',
      exclude: '#64748b',
      refuse: '#ef4444'
    };
    const STATUS_LABELS = {
      pending: '미방문',
      face: '대면 완료',
      note: '쪽지 완료',
      hold: '보류',
      exclude: '제외',
      refuse: '거절'
    };

    let leads = [];
    let coordOverrides = loadCoordOverrides();
    let state = loadState();
    let map, markers = {}, activeId = null;
    let myLocationMarker = null;
    let myLocation = null;
    let locationWatchId = null;
    let markerClusterGroup = null;
    let prevActiveId = null;
    let markerRenderTimer = null;
    let searchDebounceTimer = null;
    let filteredLeadsCache = null;
    let filteredLeadsCacheKey = '';
    let geocodeSkipped = loadGeocodeSkipped();
    let serverSyncAvailable = false;
    let syncTimer = null;
    let hoursCache = {};
    let insightsCache = {};
    let centerStatsIndex = [];
    let leadCenterStats = {};
    let filterStatus = '', filterGu = '', filterDong = '', query = '';
    let mobileDetailLeadId = null;

    function isMobileView() {
      return window.matchMedia('(max-width: 900px)').matches;
    }

    function listRenderCap() {
      return isMobileView() ? 120 : 400;
    }

    function invalidateFilteredCache() {
      filteredLeadsCache = null;
      filteredLeadsCacheKey = '';
    }

    function normalizeStatus(st) {
      if (st === 'visited') return 'face';
      if (st === 'skip') return 'exclude';
      return STATUS_KEYS.includes(st) ? st : 'pending';
    }

    function migrateLegacyStatuses() {
      let changed = false;
      Object.keys(state).forEach(id => {
        const entry = state[id];
        if (!entry || !entry.status) return;
        const next = normalizeStatus(entry.status);
        if (next !== entry.status) {
          entry.status = next;
          changed = true;
        }
      });
      if (changed) saveState();
    }

    function loadGeocodeSkipped() {
      try {
        return new Set(JSON.parse(localStorage.getItem(GEOCODE_SKIP_KEY) || '[]'));
      } catch {
        return new Set();
      }
    }

    function saveGeocodeSkipped() {
      scheduleSyncPush();
    }

    function persistLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      localStorage.setItem(COORDS_KEY, JSON.stringify(coordOverrides));
      localStorage.setItem(GEOCODE_SKIP_KEY, JSON.stringify([...geocodeSkipped]));
    }

    function scheduleSyncPush() {
      persistLocal();
      if (!serverSyncAvailable) return;
      clearTimeout(syncTimer);
      syncTimer = setTimeout(pushSyncToServer, 500);
    }

    async function loadSyncFromServer() {
      try {
        const res = await apiFetch('/api/maps-sync');
        if (!res.ok) return;
        const data = await res.json();
        serverSyncAvailable = data.syncAvailable !== false;
        if (!serverSyncAvailable) return;

        const serverHas = Object.keys(data.visitState || {}).length > 0;
        const localHas = Object.keys(state).length > 0;
        const localAt = localStorage.getItem(SYNC_AT_KEY);
        const serverAt = data.updatedAt;
        const serverIsNewer = serverAt && (!localAt || new Date(serverAt) >= new Date(localAt));

        if (data.hoursCache && typeof data.hoursCache === 'object') {
          hoursCache = { ...hoursCache, ...data.hoursCache };
        }

        if (serverHas && serverIsNewer) {
          state = data.visitState || {};
          coordOverrides = data.coordOverrides || {};
          geocodeSkipped = new Set(data.geocodeSkipped || []);
          persistLocal();
          if (serverAt) localStorage.setItem(SYNC_AT_KEY, serverAt);
        } else if (localHas) {
          await pushSyncToServer();
        }
      } catch { /* offline — local only */ }
    }

    async function pushSyncToServer() {
      if (!serverSyncAvailable) return;
      try {
        const res = await apiFetch('/api/maps-sync', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            visitState: state,
            routePlan: {},
            coordOverrides,
            geocodeSkipped: [...geocodeSkipped],
          }),
        });
        if (res.ok) {
          const data = await res.json();
          if (data.updatedAt) localStorage.setItem(SYNC_AT_KEY, data.updatedAt);
        }
      } catch { /* ignore */ }
    }

    function loadCoordOverrides() {
      try {
        return JSON.parse(localStorage.getItem(COORDS_KEY) || '{}');
      } catch {
        return {};
      }
    }

    function saveCoordOverrides() {
      scheduleSyncPush();
    }

    function isGeocodable(lead) {
      const addr = (lead.address || '').trim();
      return addr && addr !== '정보 없음';
    }

    function leadCoords(lead) {
      const o = coordOverrides[lead.id];
      if (o) return { lat: o.lat, lng: o.lng };
      return { lat: lead.lat, lng: lead.lng };
    }

    async function apiFetch(url, options = {}) {
      return fetch(url, { credentials: 'include', ...options });
    }

    async function isAuthed() {
      try {
        const res = await apiFetch('/api/leads', { method: 'HEAD' });
        if (res.ok) {
          sessionStorage.setItem(AUTH_FLAG, '1');
          return true;
        }
      } catch { /* ignore */ }
      sessionStorage.removeItem(AUTH_FLAG);
      return false;
    }

    async function login(password) {
      try {
        const res = await apiFetch('/api/maps-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (res.ok) {
          sessionStorage.setItem(AUTH_FLAG, '1');
          return;
        }
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || '로그인 실패');
      } catch (err) {
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
          if (password === 'asdf1234') {
            sessionStorage.setItem(AUTH_FLAG, '1');
            return;
          }
        }
        throw err;
      }
    }

    function showApp() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
    }

    function waitForLayout() {
      return new Promise(resolve => {
        requestAnimationFrame(() => requestAnimationFrame(resolve));
      });
    }

    async function refineCoordsViaApi() {
      const imprecise = leads.filter(l =>
        !l.precise && !coordOverrides[l.id] && !geocodeSkipped.has(l.id) && isGeocodable(l)
      );
      if (!imprecise.length) return;

      const statusEl = document.getElementById('geocodeStatus');
      let done = 0;
      let failed = 0;

      for (const lead of imprecise) {
        statusEl.textContent = `주소 좌표 변환 중… ${done + failed + 1}/${imprecise.length}`;
        statusEl.classList.add('show');
        try {
          const q = new URLSearchParams({
            address: lead.address,
            keyword: `${lead.name} ${lead.address}`,
          });
          const res = await apiFetch(`/api/geocode?${q}`);
          if (res.ok) {
            const data = await res.json();
            coordOverrides[lead.id] = { lat: data.lat, lng: data.lng, source: data.source };
            done += 1;
          } else {
            geocodeSkipped.add(lead.id);
            failed += 1;
          }
        } catch {
          geocodeSkipped.add(lead.id);
          failed += 1;
        }
        await new Promise(r => setTimeout(r, 120));
      }

      saveGeocodeSkipped();
      saveCoordOverrides();

      if (done > 0) {
        statusEl.textContent = failed
          ? `좌표 변환 완료 (${done}건, 실패 ${failed}건)`
          : `좌표 변환 완료 (${done}건)`;
        setTimeout(() => statusEl.classList.remove('show'), 2500);
      } else {
        statusEl.classList.remove('show');
      }
      refreshUI();
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch {
        return {};
      }
    }

    function saveState() {
      scheduleSyncPush();
    }

    function getStatus(id) {
      const st = (state[id] && state[id].status) || 'pending';
      return normalizeStatus(st);
    }

    function getNote(id) {
      return (state[id] && state[id].note) || '';
    }

    function getKstDateKey(iso) {
      if (!iso) return null;
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return null;
      return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Seoul' }).format(d);
    }

    function getTodayKstKey() {
      return getKstDateKey(new Date().toISOString());
    }

    function formatTodayKstLabel() {
      const now = new Date();
      const parts = new Intl.DateTimeFormat('ko-KR', {
        timeZone: 'Asia/Seoul',
        month: 'numeric',
        day: 'numeric',
        weekday: 'short',
      }).formatToParts(now);
      const get = type => parts.find(p => p.type === type)?.value || '';
      return `${get('month')}월 ${get('day')}일 (${get('weekday')})`;
    }

    function getStatusChangedAt(entry) {
      if (!entry) return null;
      if (entry.statusUpdatedAt) return entry.statusUpdatedAt;
      if (entry.updatedAt && normalizeStatus(entry.status) !== 'pending') return entry.updatedAt;
      return null;
    }

    function isSomaSubscribedLead(leadId) {
      return leadCenterStats[leadId]?.isSubscribed === true;
    }

    function renderPopupStatusBadgesHtml(leadId) {
      const hours = hoursCache[leadId];
      const open = isOpenNow(hours);
      let openClass = 'unk';
      let openLabel = '?';
      if (open === true) {
        openClass = 'on';
        openLabel = 'ON';
      } else if (open === false) {
        openClass = 'off';
        openLabel = 'OFF';
      }
      const subTag = isSomaSubscribedLead(leadId)
        ? '<span class="soma-sub-tag" title="소마 앱 구독 중">구독</span>'
        : '';
      return `<span class="open-pill ${openClass}" title="현재 영업 여부 (한국시간)">${openLabel}</span>${subTag}`;
    }

    function updatePopupStatusBadges(leadId) {
      const el = document.querySelector(`[data-status-badges-id="${leadId}"]`);
      if (!el) return;
      el.innerHTML = renderPopupStatusBadgesHtml(leadId);
    }

    function setLeadStatus(id, status, note) {
      const prev = state[id] || {};
      const prevStatus = normalizeStatus(prev.status || 'pending');
      const nextStatus = normalizeStatus(status);
      const statusChanged = nextStatus !== prevStatus;
      const now = new Date().toISOString();
      state[id] = {
        status: nextStatus,
        note: note !== undefined ? note : (prev.note || ''),
        updatedAt: now,
        statusUpdatedAt: statusChanged ? now : (prev.statusUpdatedAt || null),
      };
      saveState();
      if (isMobileView()) {
        refreshUI(id, { skipMarkers: true, keepMobileDetail: true });
      } else {
        if (map && map.closePopup) map.closePopup();
        refreshUI(id);
      }
    }

    function computeDayStats() {
      const today = getTodayKstKey();
      let visited = 0;
      let face = 0;
      let note = 0;
      let subscribed = 0;

      Object.keys(state).forEach(id => {
        const entry = state[id];
        if (!entry) return;
        const changedAt = getStatusChangedAt(entry);
        if (getKstDateKey(changedAt) !== today) return;
        visited += 1;
        const st = normalizeStatus(entry.status);
        if (st === 'face') face += 1;
        if (st === 'note') note += 1;
        if (isSomaSubscribedLead(id)) subscribed += 1;
      });

      const conversion = visited > 0
        ? `${Math.round((subscribed / visited) * 1000) / 10}%`
        : '-';

      return { visited, face, note, subscribed, conversion };
    }

    function popupContent(lead) {
      const note = getNote(lead.id);
      const phoneHtml = lead.phone
        ? `<p><a href="tel:${lead.phone}">${lead.phone}</a></p>`
        : '<p>전화번호 없음</p>';
      const addrQuery = encodeURIComponent(lead.address || lead.name);
      const nameQuery = encodeURIComponent(lead.name);
      return `<div class="kakao-info-wrap popup">
          <h3>${escapeHtml(lead.name)}</h3>
          <p>${escapeHtml(lead.gu)} ${escapeHtml(lead.dong)}</p>
          <p>${escapeHtml(lead.address)}</p>
          ${phoneHtml}
          <div class="hours-line loading" data-hours-id="${lead.id}">영업시간 불러오는 중…</div>
          <div class="popup-status-badges" data-status-badges-id="${lead.id}"></div>
          <div class="soma-line loading" data-soma-id="${lead.id}">소마 데이터 불러오는 중…</div>
          <textarea class="note-input" data-id="${lead.id}" placeholder="메모 (자동 저장)">${escapeHtml(note)}</textarea>
          <div class="popup-actions">
            <button class="pending" data-id="${lead.id}" data-status="pending">미방문</button>
            <button class="face" data-id="${lead.id}" data-status="face">대면 완료</button>
            <button class="note" data-id="${lead.id}" data-status="note">쪽지 완료</button>
            <button class="hold" data-id="${lead.id}" data-status="hold">보류</button>
            <button class="exclude" data-id="${lead.id}" data-status="exclude">제외</button>
            <button class="refuse" data-id="${lead.id}" data-status="refuse">거절</button>
          </div>
          <div class="popup-nav">
            <a href="https://map.kakao.com/?q=${addrQuery}" target="_blank" rel="noopener">카카오 지도</a>
            <a href="https://map.naver.com/v5/search/${addrQuery}" target="_blank" rel="noopener">네이버 (주소)</a>
            <a href="https://map.naver.com/v5/search/${nameQuery}" target="_blank" rel="noopener">네이버 (업체명)</a>
          </div>
        </div>`;
    }

    function renderHoursHtml(data) {
      if (!data) return '영업시간 정보 없음';
      const parts = [];
      if (data.status || data.statusDetail) {
        const closed = /휴무|종료|닫/.test(data.status || '');
        parts.push(`<div class="hours-status${closed ? ' closed' : ''}">${escapeHtml(data.status)}${data.statusDetail ? ' · ' + escapeHtml(data.statusDetail) : ''}</div>`);
      }
      if (data.schedule && data.schedule.length) {
        parts.push(data.schedule.map(row =>
          `<div class="hours-row"><span class="hours-day">${escapeHtml(row.day)}</span><span>${escapeHtml(row.hours)}</span></div>`
        ).join(''));
      }
      if (data.note) {
        parts.push(`<div class="hours-note">${escapeHtml(data.note)}</div>`);
      }
      return parts.length ? parts.join('') : '영업시간 정보 없음';
    }

    function setHoursInPopup(leadId, html, isError) {
      const el = document.querySelector(`.hours-line[data-hours-id="${leadId}"]`);
      if (!el) return;
      el.classList.remove('loading');
      if (isError) {
        el.innerHTML = escapeHtml(html);
        el.style.color = '#64748b';
      } else {
        el.innerHTML = html;
      }
      updatePopupStatusBadges(leadId);
    }

    async function fetchHoursForLead(lead) {
      const cached = hoursCache[lead.id];
      if (cached) {
        if (cached.ok === false) {
          setHoursInPopup(lead.id, cached.message || '영업시간을 찾지 못했습니다.', true);
        } else {
          setHoursInPopup(lead.id, renderHoursHtml(cached), false);
        }
        refreshMarkerIcon(lead);
        return;
      }
      setHoursInPopup(lead.id, '영업시간 불러오는 중…', true);
      try {
        const q = new URLSearchParams({
          leadId: lead.id,
          name: lead.name,
          address: lead.address || '',
        });
        const res = await apiFetch(`/api/place-hours?${q}`);
        const data = await res.json();
        if (!res.ok) {
          setHoursInPopup(lead.id, data.message || '영업시간을 찾지 못했습니다.', true);
          return;
        }
        hoursCache[lead.id] = data;
        setHoursInPopup(lead.id, renderHoursHtml(data), false);
        refreshMarkerIcon(lead);
      } catch {
        setHoursInPopup(lead.id, '영업시간 조회 실패', true);
      }
    }

    function formatDateKo(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '-';
      return `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;
    }

    function planLabel(planType) {
      const map = { trial: '체험', monthly: '월간', yearly: '연간', none: '없음' };
      return map[planType] || planType;
    }

    function renderInsightsHtml(data) {
      if (!data) return '소마 데이터 없음';
      if (!data.registered) {
        return '<div class="soma-badge none">소마 미등록 센터</div>';
      }
      const b = data.bookingActivity || {};
      const p = data.plans || {};
      const parts = [];
      parts.push(`<div class="soma-badge ok">소마 등록 · ${escapeHtml(data.match.name)}</div>`);
      parts.push(`<div class="soma-row"><span class="soma-label">등록일</span><span>${formatDateKo(data.match.registeredAt)}</span></div>`);

      parts.push('<div class="soma-section"><div class="soma-section-title">수업 예약 (누적)</div>');
      parts.push(`<div class="soma-row"><span class="soma-label">전체</span><span>${b.total || 0}건</span></div>`);
      parts.push(`<div class="soma-row"><span class="soma-label">완료/확정</span><span>${b.completed || 0}건</span></div>`);
      if (b.firstAt) {
        parts.push(`<div class="soma-row"><span class="soma-label">기간</span><span>${formatDateKo(b.firstAt)} ~ ${formatDateKo(b.lastAt)}</span></div>`);
      }
      parts.push('</div>');

      const staffActive = (p.staff || []).filter(s => s.status === 'active').reduce((sum, s) => sum + s.count, 0);
      const trainers = p.people?.trainers || {};
      const members = p.people?.members || {};
      parts.push('<div class="soma-section"><div class="soma-section-title">인원 · 플랜</div>');
      parts.push(`<div class="soma-row"><span class="soma-label">트레이너</span><span>활성 ${trainers.active || 0} · 유료 ${staffActive}</span></div>`);
      parts.push(`<div class="soma-row"><span class="soma-label">회원</span><span>활성 ${members.active || 0} · 초대 ${members.invited || 0}</span></div>`);
      const passActive = (p.memberPasses || []).filter(x => x.status === 'active').reduce((sum, x) => sum + x.count, 0);
      parts.push(`<div class="soma-row"><span class="soma-label">수강권</span><span>활성 ${passActive}건</span></div>`);
      const staffSummary = (p.staff || [])
        .filter(s => s.status === 'active' && s.planType !== 'none')
        .map(s => `${planLabel(s.planType)} ${s.count}`)
        .join(', ');
      if (staffSummary) {
        parts.push(`<div class="soma-row"><span class="soma-label">앱 구독</span><span>${escapeHtml(staffSummary)}</span></div>`);
      }
      parts.push('</div>');
      return parts.join('');
    }

    function setInsightsInPopup(leadId, html, isError) {
      const el = document.querySelector(`.soma-line[data-soma-id="${leadId}"]`);
      if (!el) return;
      el.classList.remove('loading');
      if (isError) {
        el.innerHTML = escapeHtml(html);
        el.style.color = '#64748b';
      } else {
        el.innerHTML = html;
      }
    }

    async function fetchInsightsForLead(lead) {
      if (insightsCache[lead.id]) {
        setInsightsInPopup(lead.id, renderInsightsHtml(insightsCache[lead.id]), false);
        return;
      }
      setInsightsInPopup(lead.id, '소마 데이터 불러오는 중…', true);
      try {
        const q = new URLSearchParams({
          name: lead.name,
          address: lead.address || '',
          phone: lead.phone || '',
        });
        const res = await apiFetch(`/api/center-insights?${q}`);
        const data = await res.json();
        if (!res.ok) {
          const msg = data.message || data.error || '소마 데이터를 불러오지 못했습니다.';
          setInsightsInPopup(lead.id, msg === 'not_configured' ? '소마 연동 미설정' : msg, true);
          return;
        }
        insightsCache[lead.id] = data;
        setInsightsInPopup(lead.id, renderInsightsHtml(data), false);
      } catch {
        setInsightsInPopup(lead.id, '소마 데이터 조회 실패', true);
      }
    }

    function closeMobileDetail() {
      mobileDetailLeadId = null;
      document.body.style.overflow = '';
      const panel = document.getElementById('mobileDetail');
      const backdrop = document.getElementById('mobileDetailBackdrop');
      if (panel) {
        panel.classList.remove('open');
        panel.setAttribute('aria-hidden', 'true');
      }
      if (backdrop) {
        backdrop.classList.remove('open');
        backdrop.setAttribute('aria-hidden', 'true');
      }
    }

    function showMobileDetail(lead) {
      const panel = document.getElementById('mobileDetail');
      const backdrop = document.getElementById('mobileDetailBackdrop');
      const body = document.getElementById('mobileDetailBody');
      const title = document.getElementById('mobileDetailTitle');
      if (!panel || !body || !lead) return;

      mobileDetailLeadId = lead.id;
      document.body.style.overflow = 'hidden';
      if (title) title.textContent = lead.name;
      body.innerHTML = popupContent(lead);
      panel.classList.add('open');
      panel.setAttribute('aria-hidden', 'false');
      if (backdrop) {
        backdrop.classList.add('open');
        backdrop.setAttribute('aria-hidden', 'false');
      }

      bindPopupEvents();
      updatePopupStatusBadges(lead.id);
      fetchHoursForLead(lead);
      fetchInsightsForLead(lead);

      if (map && markers[lead.id]) {
        const c = leadCoords(lead);
        map.panTo([c.lat, c.lng], { animate: true, duration: 0.35 });
      }
    }

    function openInfoForLead(lead) {
      activeId = lead.id;
      renderList(getDisplayLeads());
      updateMarkerActiveState();

      if (isMobileView()) {
        if (map && map.closePopup) map.closePopup();
        showMobileDetail(lead);
        return;
      }

      if (markers[lead.id]) markers[lead.id].openPopup();
      setTimeout(() => {
        bindPopupEvents();
        updatePopupStatusBadges(lead.id);
        fetchHoursForLead(lead);
        fetchInsightsForLead(lead);
      }, 30);
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function filteredLeads() {
      const key = `${filterGu}|${filterDong}|${filterStatus}|${query}`;
      if (filteredLeadsCache && filteredLeadsCacheKey === key) {
        return filteredLeadsCache;
      }
      filteredLeadsCacheKey = key;
      filteredLeadsCache = leads.filter(l => {
        if (filterGu && l.gu !== filterGu) return false;
        if (filterDong && l.dong !== filterDong) return false;
        if (filterStatus && getStatus(l.id) !== filterStatus) return false;
        if (query) {
          const q = query.toLowerCase();
          const blob = `${l.name} ${l.address} ${l.dong} ${l.gu} ${l.phone}`.toLowerCase();
          if (!blob.includes(q)) return false;
        }
        return true;
      });
      return filteredLeadsCache;
    }

    function distanceKm(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const toRad = d => (d * Math.PI) / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function leadDistanceKm(lead) {
      if (!myLocation) return null;
      const c = leadCoords(lead);
      return distanceKm(myLocation.lat, myLocation.lng, c.lat, c.lng);
    }

    function formatDistanceKm(km) {
      if (km == null || Number.isNaN(km)) return '';
      if (km < 1) return `${Math.round(km * 1000)}m`;
      return `${km.toFixed(1)}km`;
    }

    function getDisplayLeads() {
      const items = filteredLeads();
      if (!myLocation) return items;
      return [...items].sort((a, b) => leadDistanceKm(a) - leadDistanceKm(b));
    }

    function updateListSortHint() {
      const el = document.getElementById('listSortHint');
      if (!el) return;
      if (myLocation) {
        el.textContent = '내 위치 기준 가까운순';
        el.classList.remove('muted');
      } else {
        el.textContent = '위치 허용 시 가까운 업체부터 표시됩니다';
        el.classList.add('muted');
      }
    }

    function applyMyLocation(lat, lng, panMap) {
      myLocation = { lat, lng };
      updateListSortHint();
      if (!map) {
        refreshUI();
        return;
      }
      if (myLocationMarker) map.removeLayer(myLocationMarker);
      myLocationMarker = L.circleMarker([lat, lng], {
        radius: 8,
        color: '#2E8CD5',
        fillColor: '#5FCDF9',
        fillOpacity: 0.85,
        weight: 2,
      }).addTo(map).bindPopup('내 위치');
      if (panMap) map.setView([lat, lng], Math.max(map.getZoom(), 15));
      refreshUI(null, { skipMarkers: true, keepMobileDetail: !!mobileDetailLeadId });
    }

    function startLocationTracking() {
      if (!navigator.geolocation) return;
      const opts = { enableHighAccuracy: true, maximumAge: 30000, timeout: 20000 };
      navigator.geolocation.getCurrentPosition(
        pos => applyMyLocation(pos.coords.latitude, pos.coords.longitude, false),
        () => {},
        opts
      );
      if (locationWatchId != null) navigator.geolocation.clearWatch(locationWatchId);
      locationWatchId = navigator.geolocation.watchPosition(
        pos => applyMyLocation(pos.coords.latitude, pos.coords.longitude, false),
        () => {},
        opts
      );
    }

    function renderStats() {
      const counts = Object.fromEntries(STATUS_KEYS.map(k => [k, 0]));
      leads.forEach(l => {
        const st = getStatus(l.id);
        counts[st] = (counts[st] || 0) + 1;
      });
      document.getElementById('stats').innerHTML = `
        <span class="stat">전체 <strong>${leads.length}</strong></span>
        <span class="stat">미방문 <strong>${counts.pending}</strong></span>
        <span class="stat">대면 <strong>${counts.face}</strong></span>
        <span class="stat">쪽지 <strong>${counts.note}</strong></span>
        <span class="stat">보류 <strong>${counts.hold}</strong></span>
        <span class="stat">제외 <strong>${counts.exclude}</strong></span>
        <span class="stat">거절 <strong>${counts.refuse}</strong></span>`;

      const day = computeDayStats();
      const labelEl = document.getElementById('statsDayLabel');
      if (labelEl) labelEl.textContent = `${formatTodayKstLabel()} 실적`;
      const dayEl = document.getElementById('statsDay');
      if (dayEl) {
        dayEl.innerHTML = `
          <span class="stat">방문 <strong>${day.visited}</strong></span>
          <span class="stat">대면 <strong>${day.face}</strong></span>
          <span class="stat">쪽지 <strong>${day.note}</strong></span>
          <span class="stat" title="오늘 방문한 업장 중 DB 구독 센터">구독 <strong>${day.subscribed}</strong></span>
          <span class="stat" title="구독 센터 방문 ÷ 오늘 방문">전환율 <strong>${day.conversion}</strong></span>`;
      }
    }

    function renderList(items) {
      const el = document.getElementById('list');
      if (!items.length) {
        el.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
        return;
      }
      const cap = listRenderCap();
      const shown = items.slice(0, cap);
      const more = items.length - shown.length;
      el.innerHTML = shown.map(l => {
        const st = getStatus(l.id);
        const dist = leadDistanceKm(l);
        const distHtml = dist != null
          ? `<span class="lead-dist">${formatDistanceKm(dist)}</span> · `
          : '';
        return `
          <div class="lead-item${l.id === activeId ? ' active' : ''}" data-id="${l.id}">
            <div class="lead-top">
              <span class="dot ${st}"></span>
              <span class="lead-name">${escapeHtml(l.name)}</span>
            </div>
            <div class="lead-meta">${distHtml}${escapeHtml(l.gu)} ${escapeHtml(l.dong)} · ${STATUS_LABELS[st]}</div>
          </div>`;
      }).join('') + (more > 0
        ? `<div class="list-more-hint">${more}건 더 있음 · 검색·필터·지도 확대로 범위를 좁혀주세요</div>`
        : '');
    }

    function normalizeMatch(s) {
      return String(s || '')
        .toLowerCase()
        .replace(/\s+/g, '')
        .replace(/[^a-z0-9가-힣]/g, '');
    }

    function scoreCenterMatch(lead, center) {
      const nName = normalizeMatch(lead.name);
      const nItem = normalizeMatch(center.name);
      let score = 0;
      if (nItem === nName) score += 100;
      else if (nItem.includes(nName) || nName.includes(nItem)) score += 60;
      else {
        const a = nName.slice(0, Math.min(6, nName.length));
        if (a && nItem.includes(a)) score += 25;
      }
      const addr = normalizeMatch(lead.address);
      const itemAddr = normalizeMatch(center.address);
      if (addr && itemAddr && (itemAddr.includes(addr.slice(0, 12)) || addr.includes(itemAddr.slice(0, 12)))) {
        score += 30;
      }
      return score;
    }

    function buildLeadCenterStatsMap() {
      leadCenterStats = {};
      if (!centerStatsIndex.length) return;
      leads.forEach(lead => {
        let best = null;
        let bestScore = -1;
        for (const center of centerStatsIndex) {
          const s = scoreCenterMatch(lead, center);
          if (s > bestScore) {
            bestScore = s;
            best = center;
            if (s >= 130) break;
          }
        }
        if (best && bestScore >= 40) {
          leadCenterStats[lead.id] = best.stats || {};
        }
      });
    }

    const KST_DAYS = ['일', '월', '화', '수', '목', '금', '토'];

    function getKoreaNow() {
      return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    }

    function parseMinutes(hm) {
      const m = String(hm || '').match(/(\d{1,2}):(\d{2})/);
      if (!m) return null;
      let h = parseInt(m[1], 10);
      const min = parseInt(m[2], 10);
      if (h === 24 && min === 0) return 24 * 60;
      if (h > 23) h = 23;
      return h * 60 + min;
    }

    function hoursTextBlob(hoursData) {
      const schedule = hoursData?.schedule || [];
      const rows = schedule.map(r => `${r.day || ''} ${r.hours || ''}`).join(' ');
      return `${hoursData?.status || ''} ${hoursData?.statusDetail || ''} ${hoursData?.note || ''} ${rows}`;
    }

    function hasUsableHoursData(hoursData) {
      if (!hoursData || hoursData.ok === false) return false;
      const blob = hoursTextBlob(hoursData);
      if (/정보\s*없음|영업시간\s*(정보\s*)?없|찾지\s*못|조회\s*실패/i.test(blob)) return false;
      const schedule = hoursData.schedule || [];
      const hasSchedule = schedule.some(r => r.hours && !/^(정보\s*없음|-)$/i.test(String(r.hours).trim()));
      const hasStatus = !!(hoursData.status || hoursData.statusDetail || hoursData.note);
      return hasSchedule || hasStatus;
    }

    function is24HourOperation(hoursData) {
      const blob = hoursTextBlob(hoursData);
      if (/24\s*시간/i.test(blob)) return true;
      if (/\b00:00\s*[-–]\s*24:00\b/.test(blob)) return true;
      return false;
    }

    function normalizeScheduleDay(day) {
      return String(day || '').replace(/\(.*\)/, '').replace(/요일/g, '').trim();
    }

    function findTodayScheduleRow(schedule, dayName) {
      return (schedule || []).find(row => {
        const d = normalizeScheduleDay(row.day);
        if (!d) return false;
        if (d === '매일' || d === '전체' || /연중/i.test(d)) return true;
        return d === dayName || d.startsWith(dayName);
      });
    }

    function isOpenFromHoursText(hoursText, nowMin) {
      const text = String(hoursText || '');
      if (/휴무|closed/i.test(text)) return false;
      const range = text.match(/(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})/);
      if (!range) return null;
      const start = parseMinutes(range[1]);
      let end = parseMinutes(range[2]);
      if (start == null || end == null) return null;
      if (end >= 24 * 60 || (start === 0 && /24:00/.test(range[2]))) return true;
      if (end <= start) return nowMin >= start || nowMin < end;
      return nowMin >= start && nowMin < end;
    }

    function isOpenNow(hoursData) {
      if (!hasUsableHoursData(hoursData)) return null;

      const now = getKoreaNow();
      const dayName = KST_DAYS[now.getDay()];
      const nowMin = now.getHours() * 60 + now.getMinutes();
      const schedule = hoursData.schedule || [];
      const status = `${hoursData.status || ''} ${hoursData.statusDetail || ''}`;

      if (is24HourOperation(hoursData)) {
        if (/오늘\s*휴무|지금\s*휴무|영업\s*종료/i.test(status)) return false;
        return true;
      }

      const todayRow = findTodayScheduleRow(schedule, dayName);
      if (todayRow) {
        const fromRow = isOpenFromHoursText(todayRow.hours, nowMin);
        if (fromRow !== null) return fromRow;
      }

      if (/영업\s*중|운영\s*중|24\s*시간/i.test(status)) return true;
      if (/오늘\s*휴무|지금\s*휴무|영업\s*종료|브레이크\s*타임/i.test(status)) return false;
      return null;
    }

    function formatDelta(n) {
      if (n == null || Number.isNaN(n)) return { text: '-', cls: 'flat' };
      if (n > 0) return { text: `+${n}`, cls: 'up' };
      if (n < 0) return { text: `${n}`, cls: 'down' };
      return { text: '0', cls: 'flat' };
    }

    function formatSubExpiry(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '-';
      return `${String(d.getFullYear()).slice(2)}.${d.getMonth() + 1}.${d.getDate()}`;
    }

    function markerBadgesHtml(lead) {
      const hours = hoursCache[lead.id];
      const open = isOpenNow(hours);
      let openClass = 'unk';
      let openLabel = '?';
      if (open === true) {
        openClass = 'on';
        openLabel = 'ON';
      } else if (open === false) {
        openClass = 'off';
        openLabel = 'OFF';
      }

      const stats = leadCenterStats[lead.id];
      const somaSub = stats?.isSubscribed === true;
      const somaSubTag = somaSub
        ? '<span class="soma-sub-tag" title="소마 앱 구독 중 (production DB)">구독</span>'
        : '';
      let subHtml = '';
      if (somaSub) {
        const delta = formatDelta(stats.bookingDelta);
        subHtml = `<div class="sub-pills" title="소마 구독 센터">
          <span class="sub-pill">예약 ${stats.bookingTotal ?? 0}</span>
          <span class="sub-pill delta ${delta.cls}">전일 ${delta.text}</span>
          <span class="sub-pill exp">만료 ${formatSubExpiry(stats.trainerSubExpiresMax)}</span>
        </div>`;
      }

      return `<div class="marker-side">
        <span class="open-pill ${openClass}" title="현재 영업 여부 (한국시간)">${openLabel}</span>
        ${somaSubTag}
        ${subHtml}
      </div>`;
    }

    function isSomaSubscribedLead(leadId) {
      return leadCenterStats[leadId]?.isSubscribed === true;
    }

    function mobileOpenBadgeHtml(leadId) {
      const hours = hoursCache[leadId];
      const open = isOpenNow(hours);
      let openClass = 'unk';
      let openLabel = '?';
      if (open === true) {
        openClass = 'on';
        openLabel = 'ON';
      } else if (open === false) {
        openClass = 'off';
        openLabel = 'OFF';
      }
      return `<span class="open-pill ${openClass}" title="현재 영업 여부">${openLabel}</span>`;
    }

    function isMobileCompactMarker(lead) {
      if (isSomaSubscribedLead(lead.id)) return true;
      return isOpenNow(hoursCache[lead.id]) === false;
    }

    function isCircleMarkerLayer(layer) {
      return layer && typeof layer.setRadius === 'function';
    }

    function replaceMarkerInCluster(lead) {
      const old = markers[lead.id];
      if (!markerClusterGroup || !old) return;
      const isActive = lead.id === activeId;
      markerClusterGroup.removeLayer(old);
      const neu = createMarker(lead, isActive);
      markerClusterGroup.addLayer(neu);
      markers[lead.id] = neu;
    }

    function refreshMarkerIcon(lead) {
      if (!markers[lead.id]) return;
      const st = getStatus(lead.id);
      const isActive = lead.id === activeId;
      if (isMobileView()) {
        const wantsCompact = isMobileCompactMarker(lead);
        const isCircle = isCircleMarkerLayer(markers[lead.id]);
        if (wantsCompact !== isCircle) {
          replaceMarkerInCluster(lead);
          return;
        }
        if (wantsCompact) {
          markers[lead.id].setIcon(makeMobileCompactIcon(lead, st, isActive));
          markers[lead.id].setZIndexOffset(isActive ? 1000 : 0);
          return;
        }
        updateMarkerStyle(lead.id, isActive);
        return;
      }
      markers[lead.id].setIcon(makeLeafletIcon(lead, st, isActive));
    }

    function makeMobileCompactIcon(lead, status, isActive) {
      const color = STATUS_COLORS[status] || STATUS_COLORS.pending;
      const size = isActive ? 14 : 11;
      const somaSub = isSomaSubscribedLead(lead.id);
      const subTag = somaSub
        ? '<span class="soma-sub-tag" title="소마 앱 구독 중">구독</span>'
        : '';
      const h = somaSub ? 36 : 24;
      const html = `<div class="marker-wrap">
        <div class="marker-pin${isActive ? ' active' : ''}" style="width:${size}px;height:${size}px;background:${color};box-shadow:0 0 0 2px #fff;"></div>
        <div class="marker-side">
          ${mobileOpenBadgeHtml(lead.id)}
          ${subTag}
        </div>
      </div>`;
      return L.divIcon({
        className: 'custom-marker-wrap mobile-sub-icon',
        html,
        iconSize: [somaSub ? 54 : 42, h],
        iconAnchor: [size / 2, h / 2],
      });
    }

    function makeLeafletIcon(lead, status, isActive) {
      const color = STATUS_COLORS[status] || STATUS_COLORS.pending;
      const size = isActive ? 26 : 20;
      const somaSub = leadCenterStats[lead.id]?.isSubscribed === true;
      const w = somaSub ? 88 : 52;
      const h = Math.max(size, somaSub ? 58 : size);
      const html = `<div class="marker-wrap">
        <div class="marker-pin${isActive ? ' active' : ''}" style="width:${size}px;height:${size}px;background:${color};box-shadow:0 0 0 3px #fff,0 0 16px ${color};"></div>
        ${markerBadgesHtml(lead)}
      </div>`;
      return L.divIcon({
        className: 'custom-marker-wrap',
        html,
        iconSize: [w, h],
        iconAnchor: [size / 2, h / 2]
      });
    }

    async function loadMarkerStats() {
      try {
        const res = await apiFetch('/api/maps-marker-stats');
        const data = await res.json();
        if (!res.ok || !data.ok) return;
        centerStatsIndex = data.centers || [];
        buildLeadCenterStatsMap();
        if (activeId) updatePopupStatusBadges(activeId);
        if (map) refreshUI(null, { keepMobileDetail: !!mobileDetailLeadId });
      } catch { /* optional */ }
    }

    function bindMarkerEvents(m, lead) {
      if (isMobileView()) {
        m.on('click', () => openInfoForLead(lead));
        return;
      }
      m.bindPopup(popupContent(lead), {
        maxWidth: 300,
        minWidth: 260,
        closeOnClick: false,
        autoPan: true,
        autoPanPadding: [48, 48],
        keepInView: true,
      });
      m.on('popupopen', () => {
        activeId = lead.id;
        renderList(getDisplayLeads());
        updateMarkerActiveState();
        bindPopupEvents();
        fetchHoursForLead(lead);
        fetchInsightsForLead(lead);
      });
    }

    function createMarker(lead, isActive) {
      const c = leadCoords(lead);
      const st = getStatus(lead.id);
      const color = STATUS_COLORS[st] || STATUS_COLORS.pending;

      if (isMobileView()) {
        if (isMobileCompactMarker(lead)) {
          const m = L.marker([c.lat, c.lng], { icon: makeMobileCompactIcon(lead, st, isActive) });
          bindMarkerEvents(m, lead);
          return m;
        }
        const m = L.circleMarker([c.lat, c.lng], {
          radius: isActive ? 10 : 7,
          color: '#fff',
          weight: isActive ? 3 : 2,
          fillColor: color,
          fillOpacity: 0.92,
        });
        bindMarkerEvents(m, lead);
        return m;
      }

      const m = L.marker([c.lat, c.lng], { icon: makeLeafletIcon(lead, st, isActive) });
      bindMarkerEvents(m, lead);
      return m;
    }

    function updateMarkerStyle(id, isActive) {
      const lead = leads.find(l => l.id === id);
      const layer = markers[id];
      if (!lead || !layer) return;
      const st = getStatus(id);
      if (isMobileView()) {
        if (isMobileCompactMarker(lead)) {
          if (isCircleMarkerLayer(layer)) {
            replaceMarkerInCluster(lead);
            return;
          }
          layer.setIcon(makeMobileCompactIcon(lead, st, isActive));
          layer.setZIndexOffset(isActive ? 1000 : 0);
          return;
        }
        if (!isCircleMarkerLayer(layer)) {
          replaceMarkerInCluster(lead);
          return;
        }
        const color = STATUS_COLORS[st] || STATUS_COLORS.pending;
        layer.setStyle({
          radius: isActive ? 10 : 7,
          weight: isActive ? 3 : 2,
          fillColor: color,
        });
        if (isActive) layer.bringToFront();
        return;
      }
      layer.setIcon(makeLeafletIcon(lead, st, isActive));
      layer.setZIndexOffset(isActive ? 1000 : 0);
    }

    function updateMarkerActiveState() {
      const ids = new Set([activeId, prevActiveId].filter(Boolean));
      ids.forEach(id => updateMarkerStyle(id, id === activeId));
      prevActiveId = activeId;
    }

    function clearMarkerCluster() {
      if (markerClusterGroup) {
        markerClusterGroup.clearLayers();
        map.removeLayer(markerClusterGroup);
        markerClusterGroup = null;
      }
      markers = {};
    }

    function createMarkerClusterGroup() {
      return L.markerClusterGroup({
        chunkedLoading: true,
        chunkInterval: isMobileView() ? 180 : 120,
        chunkDelay: isMobileView() ? 40 : 25,
        maxClusterRadius: isMobileView() ? 72 : 56,
        disableClusteringAtZoom: isMobileView() ? 14 : 15,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
        removeOutsideVisibleBounds: isMobileView(),
      });
    }

    function renderMarkers(items) {
      if (!map) return;
      clearMarkerCluster();
      markerClusterGroup = createMarkerClusterGroup();
      const layers = items.map(l => {
        const m = createMarker(l, l.id === activeId);
        markers[l.id] = m;
        return m;
      });
      markerClusterGroup.addLayers(layers);
      markerClusterGroup.addTo(map);
      prevActiveId = activeId;
    }

    function scheduleMarkerRender(items) {
      clearTimeout(markerRenderTimer);
      markerRenderTimer = setTimeout(() => renderMarkers(items), isMobileView() ? 180 : 60);
    }

    function bindPopupEvents() {
      document.querySelectorAll('.popup-actions button').forEach(btn => {
        btn.onclick = () => {
          const id = btn.dataset.id;
          const noteEl = document.querySelector(`.note-input[data-id="${id}"]`);
          setLeadStatus(id, btn.dataset.status, noteEl ? noteEl.value : '');
        };
      });
      document.querySelectorAll('.note-input').forEach(ta => {
        ta.onchange = () => setLeadStatus(ta.dataset.id, getStatus(ta.dataset.id), ta.value);
        ta.onblur = ta.onchange;
      });
    }

    function refreshUI(focusId, options = {}) {
      const { skipMarkers = false, keepMobileDetail = false } = options;
      renderStats();
      updateListSortHint();
      const items = getDisplayLeads();
      renderList(items);
      if (!skipMarkers) {
        const reopenId = keepMobileDetail ? mobileDetailLeadId : null;
        if (!keepMobileDetail && isMobileView()) closeMobileDetail();
        if (focusId) renderMarkers(items);
        else scheduleMarkerRender(items);
        if (reopenId) {
          const lead = leads.find(l => l.id === reopenId);
          if (lead) showMobileDetail(lead);
        }
      } else {
        updateMarkerActiveState();
        if (keepMobileDetail && mobileDetailLeadId) {
          const lead = leads.find(l => l.id === mobileDetailLeadId);
          if (lead) {
            updatePopupStatusBadges(lead.id);
            if (markers[lead.id]) updateMarkerStyle(lead.id, true);
          }
        }
      }
      if (focusId) {
        const lead = leads.find(l => l.id === focusId);
        if (lead && map) {
          const c = leadCoords(lead);
          map.setView([c.lat, c.lng], Math.max(map.getZoom(), 16));
          openInfoForLead(lead);
        }
      }
    }

    function populateFilters() {
      const gus = [...new Set(leads.map(l => l.gu))].sort();
      const guSel = document.getElementById('filterGu');
      gus.forEach(g => {
        const o = document.createElement('option');
        o.value = g; o.textContent = g;
        guSel.appendChild(o);
      });
      updateDongFilter();
    }

    function updateDongFilter() {
      const dongSel = document.getElementById('filterDong');
      const prev = dongSel.value;
      dongSel.innerHTML = '<option value="">전체 동</option>';
      const dongs = [...new Set(
        leads.filter(l => !filterGu || l.gu === filterGu).map(l => l.dong)
      )].sort();
      dongs.forEach(d => {
        const o = document.createElement('option');
        o.value = d; o.textContent = d;
        dongSel.appendChild(o);
      });
      if (dongs.includes(prev)) dongSel.value = prev;
      else { dongSel.value = ''; filterDong = ''; }
    }

    function initMap() {
      const container = document.getElementById('map');
      map = L.map(container, {
        preferCanvas: isMobileView(),
        zoomAnimation: !isMobileView(),
        fadeAnimation: !isMobileView(),
      }).setView([37.548, 126.88], 12);
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap',
        maxZoom: 19,
        updateWhenZooming: false,
        updateWhenIdle: true,
        keepBuffer: isMobileView() ? 2 : 4,
      }).addTo(map);
    }

    function fitAllMarkers() {
      const items = getDisplayLeads();
      if (!items.length) return;
      const bounds = L.latLngBounds(items.map(l => {
        const c = leadCoords(l);
        return [c.lat, c.lng];
      }));
      map.fitBounds(bounds.pad(0.08));
    }

    async function init() {
      await waitForLayout();
      const leadsPromise = apiFetch('/api/leads');
      initMap();
      const res = await leadsPromise;
      if (!res.ok) throw new Error('데이터를 불러올 수 없습니다.');
      const data = await res.json();
      leads = data.leads || [];
      leads.filter(l => !l.precise && !isGeocodable(l)).forEach(l => geocodeSkipped.add(l.id));
      await loadSyncFromServer();
      migrateLegacyStatuses();
      populateFilters();
      refreshUI();
      startLocationTracking();
      loadMarkerStats();

      refineCoordsViaApi();

      document.getElementById('mobileDetailClose').addEventListener('click', closeMobileDetail);
      document.getElementById('mobileDetailBackdrop').addEventListener('click', closeMobileDetail);

      document.getElementById('search').addEventListener('input', e => {
        query = e.target.value.trim();
        invalidateFilteredCache();
        if (map && map.closePopup) map.closePopup();
        closeMobileDetail();
        clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(() => refreshUI(), isMobileView() ? 280 : 120);
      });

      document.getElementById('filterGu').addEventListener('change', e => {
        filterGu = e.target.value;
        invalidateFilteredCache();
        updateDongFilter();
        if (map && map.closePopup) map.closePopup();
        closeMobileDetail();
        refreshUI();
      });

      document.getElementById('filterDong').addEventListener('change', e => {
        filterDong = e.target.value;
        invalidateFilteredCache();
        if (map && map.closePopup) map.closePopup();
        closeMobileDetail();
        refreshUI();
      });

      document.getElementById('statusTabs').addEventListener('click', e => {
        const tab = e.target.closest('.tab');
        if (!tab) return;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        filterStatus = tab.dataset.status;
        invalidateFilteredCache();
        if (map && map.closePopup) map.closePopup();
        closeMobileDetail();
        refreshUI();
      });

      document.getElementById('list').addEventListener('click', e => {
        const item = e.target.closest('.lead-item');
        if (!item) return;
        activeId = item.dataset.id;
        refreshUI(activeId);
      });

      document.getElementById('btnFit').addEventListener('click', fitAllMarkers);

      document.getElementById('btnLocate').addEventListener('click', () => {
        if (!navigator.geolocation) return alert('위치 정보를 사용할 수 없습니다.');
        navigator.geolocation.getCurrentPosition(
          pos => applyMyLocation(pos.coords.latitude, pos.coords.longitude, true),
          () => alert('위치 권한이 필요합니다.'),
          { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
        );
      });

      document.getElementById('btnExport').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify({ exportedAt: new Date().toISOString(), state }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `soma-sales-backup-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
      });

      document.getElementById('btnImport').addEventListener('click', () => {
        document.getElementById('importFile').click();
      });

      document.getElementById('importFile').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            state = { ...state, ...(data.state || data) };
            saveState();
            refreshUI();
            alert('복원되었습니다.');
          } catch {
            alert('파일 형식이 올바르지 않습니다.');
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      });

      document.getElementById('btnReset').addEventListener('click', () => {
        if (!confirm('모든 영업 기록(방문 상태·메모)을 초기화할까요?')) return;
        state = {};
        saveState();
        closeMobileDetail();
        refreshUI();
      });

      let wasMobileView = isMobileView();
      window.addEventListener('resize', () => {
        const nowMobile = isMobileView();
        if (nowMobile === wasMobileView) return;
        wasMobileView = nowMobile;
        if (map && map.closePopup) map.closePopup();
        if (!nowMobile) closeMobileDetail();
        refreshUI(null, { keepMobileDetail: nowMobile && !!mobileDetailLeadId });
      });
    }

    async function boot() {
      const authed = await isAuthed();
      if (authed) {
        showApp();
        try {
          await init();
        } catch (err) {
          console.error(err);
          alert('지도를 불러오지 못했습니다.\n\n' + (err.message || err));
        }
        return;
      }

      const loginPassword = document.getElementById('loginPassword');
      const loginError = document.getElementById('loginError');

      document.getElementById('btnLogin').addEventListener('click', async () => {
        loginError.textContent = '';
        try {
          await login(loginPassword.value);
          showApp();
          await init();
        } catch (err) {
          if (err.message && err.message.includes('비밀')) {
            loginError.textContent = err.message;
          } else {
            console.error(err);
            alert('지도를 불러오지 못했습니다.\n\n' + (err.message || err));
          }
        }
      });

      loginPassword.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btnLogin').click();
      });
    }

    boot();
  </script>
</body>
</html>
